<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Common Polysemes — Shirley's Lexicon | Academic Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --cream: #fef9ef;
      --paper: #f2ebe5;
      --ink: #1e1e2a;
      --ink-soft: #4b4b6b;
      --ink-faint: #7c7c9a;
      --gold: #b58b4f;
      --gold-soft: #d9b48b;
      --sage: #5f7d6c;
      --rose: #bc6c6c;
      --indigo: #3c4f76;
      --border-light: rgba(0, 0, 0, 0.05);
      --glass: rgba(254, 249, 239, 0.82);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 18px 36px -12px rgba(0, 0, 0, 0.12);
      
      /* 閃卡背面新配色 — 對眼睛友好的暖灰底色 */
      --flash-back-bg: #2c2f36;
      --flash-back-text: #ece8e0;
      --flash-back-subtle: #bfb9ad;
      --flash-border: rgba(210, 180, 140, 0.25);
    }

    body {
      background-color: var(--paper);
      background-image: radial-gradient(circle at 10% 20%, rgba(181, 139, 79, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 70%, rgba(92, 125, 108, 0.05) 0%, transparent 45%);
      font-family: 'Inter', system-ui, -apple-system, 'Noto Sans TC', sans-serif;
      color: var(--ink);
      min-height: 100vh;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* header */
    .academic-header {
      text-align: center;
      margin-bottom: 2.2rem;
      position: relative;
    }
    .seal {
      display: inline-block;
      width: 48px;
      height: 48px;
      line-height: 48px;
      border-radius: 50%;
      background: rgba(181, 139, 79, 0.12);
      color: var(--gold);
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      backdrop-filter: blur(2px);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #2c2c3a, #4f4f6a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
      background: none;
      -webkit-text-fill-color: var(--gold);
    }
    .subhead {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--ink-faint);
      margin-top: 8px;
      border-top: 1px solid var(--border-light);
      display: inline-block;
      padding-top: 8px;
    }

    /* main glass panel */
    .study-panel {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow-md);
      padding: 1.8rem 2rem;
      transition: all 0.2s;
    }

    /* mode bar */
    .mode-bar {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      background: rgba(0, 0, 0, 0.02);
      width: fit-content;
      margin: 0 auto 1.8rem auto;
      padding: 0.35rem;
      border-radius: 60px;
      border: 1px solid rgba(181, 139, 79, 0.25);
    }
    .mode-btn {
      border: none;
      background: transparent;
      padding: 0.55rem 1.6rem;
      border-radius: 40px;
      font-weight: 550;
      font-size: 0.85rem;
      color: var(--ink-soft);
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .mode-btn.active {
      background: white;
      color: var(--indigo);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      border: 0.5px solid rgba(0, 0, 0, 0.02);
    }
    .mode-btn:hover { color: var(--ink); }

    /* search */
    .search-section {
      max-width: 540px;
      margin: 0 auto 1.5rem auto;
      position: relative;
    }
    .search-section input {
      width: 100%;
      padding: 14px 18px 14px 48px;
      font-size: 0.9rem;
      border: 1px solid rgba(181, 139, 79, 0.3);
      border-radius: 48px;
      background: white;
      font-family: 'Inter', monospace;
      outline: none;
      transition: all 0.2s;
      color: var(--ink);
    }
    .search-section input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(181, 139, 79, 0.2);
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
    }
    .search-badge {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--cream);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 30px;
      color: var(--ink-soft);
      pointer-events: none;
      border: 0.5px solid rgba(0,0,0,0.05);
    }

    /* alpha navigation */
    .alpha-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(181, 139, 79, 0.2);
    }
    .alpha-btn {
      min-width: 38px;
      height: 38px;
      background: white;
      border: 0.5px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      font-weight: 550;
      font-size: 0.85rem;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', monospace;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .alpha-btn:hover {
      background: var(--gold-soft);
      color: white;
      border-color: transparent;
      transform: translateY(-1px);
    }
    .alpha-btn.active {
      background: var(--indigo);
      color: white;
      border-color: var(--indigo);
      box-shadow: 0 4px 8px rgba(60, 79, 118, 0.2);
    }
    .alpha-btn.fav-btn {
      background: #fff1f0;
      color: var(--rose);
      width: auto;
      padding: 0 16px;
    }
    .alpha-btn.fav-btn.active {
      background: var(--rose);
      color: white;
    }

    /* List view grid — 符合要求: word + pos + meaning (從 csv meaning 欄位) + 點開出現英文例句 + 中文句子 (不重複) */
    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.2rem;
    }
    .word-card {
      background: white;
      border-radius: 18px;
      padding: 1.2rem 1.2rem 1rem 1.2rem;
      transition: all 0.25s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.04);
      cursor: pointer;
      position: relative;
      animation: fadeUp 0.35s ease backwards;
    }
    .word-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: rgba(181, 139, 79, 0.25);
    }
    .star-icon {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.2rem;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #dbdbdb;
      transition: 0.15s;
      z-index: 3;
    }
    .star-icon.active {
      color: #f4b942;
      text-shadow: 0 0 3px rgba(244, 185, 66, 0.4);
    }
    .word-head {
      display: flex;
      flex-direction: column;
    }
    .word-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.2px;
    }
    .pos-tag {
      display: inline-block;
      background: rgba(92, 125, 108, 0.12);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      color: var(--sage);
      margin-top: 5px;
      width: fit-content;
      text-transform: lowercase;
    }
    /* 主要顯示釋義 (meaning) 直接來自 CSV meaning 欄位 */
    .meaning-short {
      font-size: 0.9rem;
      color: var(--ink);
      font-weight: 500;
      margin-top: 10px;
      line-height: 1.35;
      background: rgba(181, 139, 79, 0.05);
      padding: 6px 8px;
      border-radius: 12px;
      border-left: 2px solid var(--gold);
    }
    /* 中文翻譯不再單獨顯示在外面，避免重複，點開後才出現完整中英對照 */
    .detail-expand {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(0, 0, 0, 0.08);
      font-size: 0.85rem;
    }
    .detail-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      background: rgba(60, 79, 118, 0.08);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      margin-bottom: 5px;
    }
    .example-sentence {
      color: var(--ink-faint);
      line-height: 1.45;
    }
    .example-en {
      font-weight: 500;
      color: var(--indigo);
      margin-bottom: 4px;
    }
    .example-zh {
      color: var(--ink-soft);
      font-style: normal;
    }

    /* Flashcard mode — 字體更大更易讀，背面改為友好深色 (暖灰) */
    .flash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .flip-card {
      perspective: 1100px;
      height: 300px;
      cursor: pointer;
      animation: fadeUp 0.4s ease backwards;
    }
    .flip-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 24px;
    }
    .flip-card.flipped .flip-inner {
      transform: rotateY(180deg);
    }
    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      padding: 1.6rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: white;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .flip-front {
      background: linear-gradient(145deg, #ffffff, #fcf9f5);
    }
    .flip-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--indigo));
      border-radius: 4px;
    }
    .flip-back {
      background: var(--flash-back-bg);
      transform: rotateY(180deg);
      color: var(--flash-back-text);
      overflow-y: auto;
      justify-content: flex-start;
      gap: 0.8rem;
      border: 1px solid var(--flash-border);
    }
    .fc-word {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.3rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .fc-pos {
      font-size: 0.9rem;
      background: rgba(92, 125, 108, 0.2);
      padding: 4px 14px;
      border-radius: 30px;
      color: var(--sage);
      font-weight: 600;
    }
    .meaning-group {
      width: 100%;
      text-align: left;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid rgba(210, 180, 140, 0.2);
      padding-bottom: 0.8rem;
    }
    .meaning-group:last-child {
      border-bottom: none;
    }
    .meaning-cn {
      font-weight: 700;
      font-size: 1rem;
      color: var(--gold-soft);
      margin-bottom: 6px;
    }
    /* 英文句子在前，中文在後，不加多餘引號 */
    .example-en-first {
      font-size: 0.85rem;
      color: #e6dccf;
      font-style: italic;
      line-height: 1.4;
      margin-top: 6px;
    }
    .example-zh {
      font-size: 0.8rem;
      color: var(--flash-back-subtle);
      margin-top: 4px;
      padding-left: 6px;
      border-left: 2px solid rgba(210, 180, 140, 0.4);
    }
    .flip-hint {
      margin-top: auto;
      font-size: 0.7rem;
      opacity: 0.65;
      letter-spacing: 1px;
    }
    .empty-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--ink-soft);
    }
    .footer-stats {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--ink-faint);
      border-top: 1px solid rgba(0,0,0,0.05);
      padding-top: 1.2rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      .container { padding: 1rem; }
      .study-panel { padding: 1rem; }
      .mode-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
      .list-grid { grid-template-columns: 1fr; }
      .flash-grid { grid-template-columns: 1fr; }
      .fc-word { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="academic-header">
    <div class="seal">📖</div>
    <h1>Common Polysemes <em>常用一詞多義</em></h1>
    <div class="subhead">Collated by Shirley • one word, many shades</div>
  </div>

  <div class="study-panel">
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="list">📚 Lexicon View</button>
      <button class="mode-btn" data-mode="flash">🃏 Flash Scholar</button>
    </div>

    <div class="search-section">
      <span class="search-icon">🔍</span>
      <input type="text" id="globalSearch" placeholder="Search word, meaning, Chinese..." autocomplete="off">
      <span class="search-badge" id="searchBadge">A</span>
    </div>

    <div class="alpha-nav" id="alphaNav"></div>

    <!-- List view section -->
    <div id="listViewSection">
      <div class="list-grid" id="listGrid"></div>
    </div>

    <!-- Flash view section -->
    <div id="flashViewSection" style="display: none;">
      <div class="flash-grid" id="flashGrid"></div>
    </div>

    <div class="footer-stats" id="footerStats">loading polysemes...</div>
  </div>
</div>

<script>
  // ---- CONFIGURATION ----
  const CSV_URL = "https://ducj-creator.github.io/Shirley-Grammar/polysemy.csv";
  const STORAGE_FAV_KEY = "shirley_polysemes_favs_v4";

  let fullData = [];            // each entry: { word, pos, meaning, english, chinese }
  let favorites = new Set();

  let currentMode = "list";
  let currentFilterType = "alpha";
  let currentLetter = "A";
  let searchQuery = "";

  function getRowKey(row) {
    return `${row.word}|${row.pos}|${row.meaning}`.toLowerCase();
  }

  // ---- CSV parsing (robust) ----
  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === ',' && !inQuotes) {
        result.push(current);
        current = "";
      } else {
        current += ch;
      }
    }
    result.push(current);
    return result;
  }

  async function loadPolysemes() {
    try {
      const response = await fetch(CSV_URL);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      if (lines.length < 2) throw new Error("CSV too short");
      
      const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
      const wordIdx = headers.findIndex(h => h === "word");
      const posIdx = headers.findIndex(h => h === "pos");
      const meaningIdx = headers.findIndex(h => h === "meaning");
      const englishIdx = headers.findIndex(h => h === "english");
      const chineseIdx = headers.findIndex(h => h === "chinese");
      
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        const word = (cols[wordIdx] || "").trim();
        if (!word) continue;
        rows.push({
          word: word,
          pos: (cols[posIdx] || "").trim(),
          meaning: (cols[meaningIdx] || "").trim(),
          english: (cols[englishIdx] || "").trim(),
          chinese: (cols[chineseIdx] || "").trim()
        });
      }
      fullData = rows;
      document.getElementById("footerStats").innerHTML = `📌 ${fullData.length} sense entries · ${new Set(fullData.map(d => d.word)).size} unique word types`;
    } catch (err) {
      console.error(err);
      document.getElementById("listGrid").innerHTML = `<div class="empty-message">⚠️ Failed to load polysemy data. Please refresh or check network.</div>`;
      fullData = [];
    }
  }

  function getFilteredData() {
    let filtered = [...fullData];
    if (currentFilterType === "search" && searchQuery.trim() !== "") {
      const q = searchQuery.trim().toLowerCase();
      filtered = filtered.filter(item => 
        item.word.toLowerCase().includes(q) ||
        item.meaning.toLowerCase().includes(q) ||
        item.chinese.toLowerCase().includes(q) ||
        (item.english && item.english.toLowerCase().includes(q))
      );
    } 
    else if (currentFilterType === "fav") {
      filtered = filtered.filter(item => favorites.has(getRowKey(item)));
    }
    else if (currentFilterType === "alpha") {
      filtered = filtered.filter(item => {
        const firstChar = (item.word[0] || "").toUpperCase();
        return firstChar === currentLetter;
      });
    }
    return filtered;
  }

  // ---- LIST VIEW (meaning 直接顯示；點開顯示英文句子在前 + 中文句子在後，不加額外引號，不重複) ----
  function renderListView(data) {
    const container = document.getElementById("listGrid");
    container.innerHTML = "";
    if (!data.length) {
      container.innerHTML = `<div class="empty-message">✨ ${currentFilterType === "fav" ? "No starred entries yet. Star any sense in list view!" : currentFilterType === "search" ? "No matches found." : `No polysemes starting with "${currentLetter}".`}</div>`;
      return;
    }
    
    data.forEach((item, idx) => {
      const key = getRowKey(item);
      const isStarred = favorites.has(key);
      const card = document.createElement("div");
      card.className = "word-card";
      card.style.animationDelay = `${Math.min(idx * 0.02, 0.3)}s`;
      
      // 顯示: word, pos, meaning (直接來自 csv meaning 欄位)
      // 注意：不另外顯示中文，避免重複。點開後才顯示英文例句 + 中文句子 (依照 csv english / chinese)
      card.innerHTML = `
        <button class="star-icon ${isStarred ? 'active' : ''}" data-key="${key.replace(/"/g, '&quot;')}">★</button>
        <div class="word-head">
          <div class="word-text">${escapeHtml(item.word)}</div>
          <span class="pos-tag">${escapeHtml(item.pos)}</span>
        </div>
        <div class="meaning-short">📖 ${escapeHtml(item.meaning)}</div>
        <div class="detail-expand" style="display: none;"></div>
      `;
      
      const starBtn = card.querySelector(".star-icon");
      starBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleFavorite(key);
        starBtn.classList.toggle("active", favorites.has(key));
        if (currentFilterType === "fav") renderCurrentView();
      });
      
      let expanded = false;
      const expandDiv = card.querySelector(".detail-expand");
      card.addEventListener("click", (e) => {
        if (e.target === starBtn || starBtn.contains(e.target)) return;
        if (!expanded) {
          expandDiv.style.display = "block";
          // 點開後: 先顯示英文句子，再顯示中文句子，不加雙引號，不重複
          let exampleHtml = '';
          if (item.english && item.chinese) {
            exampleHtml = `
              <div class="detail-label">✍️ example</div>
              <div class="example-sentence">
                <div class="example-en">${escapeHtml(item.english)}</div>
                <div class="example-zh">${escapeHtml(item.chinese)}</div>
              </div>
            `;
          } else if (item.english) {
            exampleHtml = `
              <div class="detail-label">✍️ example</div>
              <div class="example-sentence">
                <div class="example-en">${escapeHtml(item.english)}</div>
              </div>
            `;
          } else if (item.chinese) {
            exampleHtml = `
              <div class="detail-label">✍️ example</div>
              <div class="example-sentence">
                <div class="example-zh">${escapeHtml(item.chinese)}</div>
              </div>
            `;
          }
          expandDiv.innerHTML = exampleHtml;
          expanded = true;
        } else {
          expandDiv.style.display = "none";
          expandDiv.innerHTML = "";
          expanded = false;
        }
      });
      container.appendChild(card);
    });
  }
  
  // ---- FLASHCARD: 字體放大，背面順序：英文句子在前，中文句子在後，不加多餘引號 ----
  function renderFlashView(data) {
    const container = document.getElementById("flashGrid");
    container.innerHTML = "";
    if (!data.length) {
      container.innerHTML = `<div class="empty-message">🔖 No cards for this selection. Star some or change letter.</div>`;
      return;
    }
    
    const groupMap = new Map();
    for (const row of data) {
      const groupKey = `${row.word.toLowerCase()}||${row.pos.toLowerCase()}`;
      if (!groupMap.has(groupKey)) {
        groupMap.set(groupKey, {
          word: row.word,
          pos: row.pos,
          meanings: []
        });
      }
      groupMap.get(groupKey).meanings.push({
        chinese: row.chinese,
        english: row.english,
        meaning: row.meaning
      });
    }
    
    const groups = Array.from(groupMap.values());
    groups.forEach((group, idx) => {
      const flipCard = document.createElement("div");
      flipCard.className = "flip-card";
      flipCard.style.animationDelay = `${Math.min(idx * 0.04, 0.5)}s`;
      
      let backHTML = `<div style="width:100%; max-height: 240px; overflow-y: auto; padding-right: 6px;">`;
      group.meanings.forEach((m) => {
        // 背面顯示: 先顯示釋義 (meaning)，然後英文句子在前，中文在後，不加引號
        backHTML += `
          <div class="meaning-group">
            <div class="meaning-cn">📖 ${escapeHtml(m.meaning)}</div>
            ${m.english ? `<div class="example-en-first">${escapeHtml(m.english)}</div>` : ''}
            ${m.chinese ? `<div class="example-zh">${escapeHtml(m.chinese)}</div>` : ''}
          </div>
        `;
      });
      backHTML += `</div><div class="flip-hint">↺ tap to flip</div>`;
      
      flipCard.innerHTML = `
        <div class="flip-inner">
          <div class="flip-front">
            <div class="fc-word">${escapeHtml(group.word)}</div>
            <div class="fc-pos">${escapeHtml(group.pos)}</div>
            <div class="flip-hint" style="margin-top: 20px;">tap to reveal meanings</div>
          </div>
          <div class="flip-back">
            ${backHTML}
          </div>
        </div>
      `;
      
      flipCard.addEventListener("click", () => flipCard.classList.toggle("flipped"));
      container.appendChild(flipCard);
    });
  }
  
  function renderCurrentView() {
    const filtered = getFilteredData();
    if (currentMode === "list") {
      renderListView(filtered);
    } else {
      renderFlashView(filtered);
    }
  }
  
  // ---- Favorites ----
  function toggleFavorite(key) {
    if (favorites.has(key)) favorites.delete(key);
    else favorites.add(key);
    localStorage.setItem(STORAGE_FAV_KEY, JSON.stringify([...favorites]));
  }
  
  function loadFavorites() {
    const stored = localStorage.getItem(STORAGE_FAV_KEY);
    if (stored) {
      try { favorites = new Set(JSON.parse(stored)); } catch(e) {}
    }
  }
  
  // ---- Alpha Bar ----
  function buildAlphaBar() {
    const bar = document.getElementById("alphaNav");
    bar.innerHTML = "";
    const starBtn = document.createElement("button");
    starBtn.textContent = "⭐ Starred";
    starBtn.className = `alpha-btn fav-btn ${currentFilterType === "fav" ? "active" : ""}`;
    starBtn.onclick = () => {
      currentFilterType = "fav";
      searchQuery = "";
      document.getElementById("globalSearch").value = "";
      updateBadgeText("★");
      clearActiveAlpha();
      starBtn.classList.add("active");
      renderCurrentView();
    };
    bar.appendChild(starBtn);
    
    for (let i = 65; i <= 90; i++) {
      const letter = String.fromCharCode(i);
      const btn = document.createElement("button");
      btn.textContent = letter;
      btn.className = `alpha-btn ${currentFilterType === "alpha" && currentLetter === letter ? "active" : ""}`;
      btn.onclick = () => {
        currentFilterType = "alpha";
        currentLetter = letter;
        searchQuery = "";
        document.getElementById("globalSearch").value = "";
        updateBadgeText(letter);
        clearActiveAlpha();
        btn.classList.add("active");
        renderCurrentView();
      };
      bar.appendChild(btn);
    }
  }
  
  function clearActiveAlpha() {
    document.querySelectorAll(".alpha-btn").forEach(btn => btn.classList.remove("active"));
  }
  
  function updateBadgeText(txt) {
    document.getElementById("searchBadge").textContent = txt;
  }
  
  // ---- Search ----
  function initSearch() {
    const searchInput = document.getElementById("globalSearch");
    searchInput.addEventListener("input", (e) => {
      const val = e.target.value.trim();
      searchQuery = val;
      if (val !== "") {
        currentFilterType = "search";
        updateBadgeText("🔍");
        clearActiveAlpha();
      } else {
        const activeFav = document.querySelector(".alpha-btn.fav-btn.active");
        if (activeFav && activeFav.textContent.includes("Starred")) {
          currentFilterType = "fav";
          updateBadgeText("★");
        } else {
          currentFilterType = "alpha";
          updateBadgeText(currentLetter);
          const alphaBtns = document.querySelectorAll(".alpha-btn");
          alphaBtns.forEach(btn => {
            if (btn.textContent === currentLetter && !btn.classList.contains("fav-btn")) btn.classList.add("active");
          });
        }
      }
      renderCurrentView();
    });
  }
  
  // ---- Mode Toggle ----
  function initModeToggle() {
    const btns = document.querySelectorAll(".mode-btn");
    btns.forEach(btn => {
      btn.addEventListener("click", () => {
        btns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
        document.getElementById("listViewSection").style.display = currentMode === "list" ? "block" : "none";
        document.getElementById("flashViewSection").style.display = currentMode === "flash" ? "block" : "none";
        renderCurrentView();
      });
    });
  }
  
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }
  
  // ---- Boot ----
  async function init() {
    loadFavorites();
    buildAlphaBar();
    initModeToggle();
    initSearch();
    await loadPolysemes();
    currentFilterType = "alpha";
    currentLetter = "A";
    updateBadgeText("A");
    const defaultAlpha = Array.from(document.querySelectorAll(".alpha-btn")).find(btn => btn.textContent === "A" && !btn.classList.contains("fav-btn"));
    if (defaultAlpha) defaultAlpha.classList.add("active");
    renderCurrentView();
  }
  
  init();
</script>
</body>
</html>
