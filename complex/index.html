<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 3: Complex Sentences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #12151F;
            --stage:    #1A1E2E;
            --card:     #252A3D;
            --border:   rgba(255,255,255,0.07);
            --text:     #E8ECFF;
            --sub:      #7B82B0;
            --dim:      #3C4260;

            /* clause colors */
            --c-main: #7EC8E3;   /* independent / main clause - sky blue */
            --c-dep:  #FFB3C6;   /* dependent clause - rose pink */
            --c-conj: #FFD166;   /* conjunction - gold */

            /* type accent colors */
            --c-adv:  #6EE7B7;   /* adverb clause - mint */
            --c-adj:  #C9B1FF;   /* adjective clause - lavender */
            --c-noun: #FFA552;   /* noun clause - orange */

            --font-en: 'Nunito', sans-serif;
            --font-cn: 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: #0A0C14;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-en);
            overflow: hidden;
        }

        /* ─── Stage (16:9) ───────────────────────── */
        #stage {
            width: min(100vw, calc(100vh * 16/9));
            height: min(100vh, calc(100vw * 9/16));
            background: var(--stage);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }

        /* ─── Ambient Glow ───────────────────────── */
        .amb {
            position: absolute; border-radius: 50%;
            filter: blur(90px); opacity: 0.14;
            pointer-events: none; z-index: 0;
            transition: background 1.8s ease;
        }
        #amb1 { width: 55%; height: 90%; top: -25%; left: -10%; background: var(--c-main); }
        #amb2 { width: 45%; height: 70%; bottom: -20%; right: -8%; background: var(--c-dep); }

        /* scanlines */
        .scanline {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
        }

        /* ─── Top Bar ────────────────────────────── */
        .top-bar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: clamp(10px,1.8%,18px) clamp(14px,3%,28px);
        }

        .step-label {
            font-size: clamp(0.6rem,1.1vw,0.82rem);
            font-weight: 700; color: var(--sub);
            letter-spacing: 1.2px; text-transform: uppercase;
        }

        .top-controls { display: flex; gap: 10px; }

        .ctrl-btn {
            width: clamp(32px,4vw,42px); height: clamp(32px,4vw,42px);
            border-radius: 50%; border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.05); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(0.85rem,1.4vw,1.05rem);
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.11); transform: scale(1.1); }

        /* ─── Pause Banner ───────────────────────── */
        #pauseBanner {
            position: absolute; top: 0; left: 0; right: 0; z-index: 80;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: clamp(8px,1.4%,14px) clamp(14px,3%,28px);
            background: rgba(6,8,16,0.93); backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--border);
            opacity: 0; pointer-events: none;
            transform: translateY(-100%);
            transition: opacity 0.3s, transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        #pauseBanner.active { opacity: 1; pointer-events: all; transform: translateY(0); }

        .p-left { display: flex; align-items: center; gap: 10px; }
        .p-icon { font-size: clamp(1rem,2vw,1.3rem); }
        .p-title { font-size: clamp(0.8rem,1.4vw,1rem); font-weight: 800; color: var(--text); }
        .p-hint  { font-size: clamp(0.62rem,1vw,0.78rem); color: var(--sub); }
        .resume-btn {
            padding: clamp(5px,0.8%,8px) clamp(14px,2.5%,20px);
            background: var(--c-main); color: #0A0C14; border: none; border-radius: 20px;
            font-family: var(--font-en); font-size: clamp(0.75rem,1.3vw,0.9rem); font-weight: 800;
            cursor: pointer; white-space: nowrap; transition: transform 0.15s;
        }
        .resume-btn:hover { transform: scale(1.05); }

        /* Dim when paused */
        #stage.paused #scene-area,
        #stage.paused #subtitle-area { filter: brightness(0.58); transition: filter 0.3s; }

        /* ─── Scene Area ─────────────────────────── */
        #scene-area {
            position: absolute;
            top: 11%; left: 0; right: 0; bottom: 22%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
            gap: clamp(10px,2%,22px);
        }

        /* ─── Title Group ────────────────────────── */
        #title-group {
            text-align: center;
            opacity: 0; transform: translateY(-14px);
            transition: opacity 0.7s, transform 0.7s;
        }
        #title-group.show { opacity: 1; transform: translateY(0); }

        .main-title {
            font-size: clamp(1.8rem,5vw,4rem);
            font-weight: 900; color: var(--text);
            letter-spacing: -1px; line-height: 1.05;
        }
        .main-title em { font-style: normal; color: var(--c-dep); }

        .level-badge {
            display: inline-block; margin-top: 8px;
            padding: 4px 14px; border: 1.5px solid var(--border); border-radius: 20px;
            font-size: clamp(0.65rem,1.1vw,0.85rem); font-weight: 700;
            color: var(--sub); letter-spacing: 2px; text-transform: uppercase;
        }

        /* ─── Scene Layout (blocks row) ─────────── */
        .scene-row {
            display: flex; align-items: center; justify-content: center;
            gap: clamp(8px,1.5vw,18px);
            width: 90%;
            opacity: 0; transition: opacity 0.4s;
        }
        .scene-row.show { opacity: 1; }

        /* ─── Clause Blocks ──────────────────────── */
        .clause-block {
            padding: clamp(10px,1.6%,18px) clamp(14px,2.5%,26px);
            border-radius: 14px;
            font-size: clamp(0.8rem,1.8vw,1.3rem);
            font-weight: 800; color: #111;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            opacity: 0; transform: scale(0.85) translateY(10px);
            transition: all 0.55s cubic-bezier(0.34,1.4,0.64,1);
            position: relative; overflow: visible;
            flex: 1; min-width: 0;
        }
        .clause-block.show { opacity: 1; transform: scale(1) translateY(0); }

        .clause-block .blk-label {
            display: block;
            font-size: clamp(0.5rem,0.9vw,0.7rem);
            font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; opacity: 0.6;
            margin-bottom: 5px;
        }

        .blk-main { background: var(--c-main); }
        .blk-dep  { background: var(--c-dep);  }
        .blk-conj {
            background: var(--c-conj); color: #111;
            flex: 0; min-width: auto;
            padding: clamp(8px,1.2%,14px) clamp(10px,2%,20px);
            font-size: clamp(0.75rem,1.5vw,1.1rem);
        }

        /* type-colored borders on dependent clause */
        .dep-adv  { outline: 3px solid var(--c-adv);  }
        .dep-adj  { outline: 3px solid var(--c-adj);  }
        .dep-noun { outline: 3px solid var(--c-noun); }

        /* ─── Type Tag ───────────────────────────── */
        #type-tag {
            font-size: clamp(0.65rem,1.2vw,0.9rem);
            font-weight: 700; color: var(--sub);
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 16px;
            opacity: 0; transform: translateY(6px);
            transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
            text-align: center;
        }
        #type-tag.show { opacity: 1; transform: translateY(0); }

        /* ─── Level Comparison Strip ─────────────── */
        #level-strip {
            display: none;
            flex-direction: column;
            gap: clamp(6px,1.2%,12px);
            width: 85%;
            opacity: 0; transition: opacity 0.5s;
        }
        #level-strip.show { opacity: 1; }

        .lvl-row {
            display: flex; align-items: center; gap: 12px;
            background: var(--card); border: 1.5px solid var(--border);
            border-radius: 12px; padding: clamp(8px,1.2%,14px) clamp(12px,2%,20px);
            opacity: 0; transform: translateX(-16px);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
        }
        .lvl-row.show { opacity: 1; transform: translateX(0); }

        .lvl-num {
            font-size: clamp(0.7rem,1.2vw,0.9rem);
            font-weight: 900; padding: 4px 10px;
            border-radius: 8px; white-space: nowrap; flex-shrink: 0;
        }
        .lvl-1 { background: var(--c-main); color: #0A0C14; }
        .lvl-2 { background: var(--c-conj); color: #0A0C14; }
        .lvl-3 { background: var(--c-dep);  color: #0A0C14; }

        .lvl-text {
            font-size: clamp(0.75rem,1.4vw,1rem);
            font-weight: 700; color: var(--text);
        }
        .lvl-cn {
            font-family: var(--font-cn);
            font-size: clamp(0.62rem,1.1vw,0.82rem);
            color: var(--sub); margin-left: auto; white-space: nowrap; flex-shrink: 0;
        }

        /* ─── Subtitle Area ──────────────────────── */
        #subtitle-area {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 22%; z-index: 20;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 0 5% 2%; gap: 5px;
            background: linear-gradient(to top, rgba(8,10,18,0.96) 55%, transparent);
        }

        .sub-en {
            font-size: clamp(0.85rem,2vw,1.45rem);
            font-weight: 700; color: #fff; text-align: center; line-height: 1.3;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.45s, transform 0.45s;
        }
        .sub-tc {
            font-family: var(--font-cn);
            font-size: clamp(0.7rem,1.5vw,1.05rem);
            color: var(--sub); text-align: center; line-height: 1.4;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.45s 0.1s, transform 0.45s 0.1s;
        }
        .sub-en.show, .sub-tc.show { opacity: 1; transform: translateY(0); }

        /* ─── Progress ───────────────────────────── */
        .progress-rail {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: rgba(255,255,255,0.05); z-index: 30;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--c-main), var(--c-dep));
            transition: width 0.15s linear;
        }

        /* ─── Rain Effect ────────────────────────── */
        .rain-drop {
            position: absolute; width: 2px; height: 10px;
            background: rgba(110,231,183,0.6); border-radius: 2px;
            top: -20px; animation: rainFall 0.9s linear infinite;
            pointer-events: none;
        }
        @keyframes rainFall { to { transform: translateY(200px); opacity: 0; } }

        /* ─── Spotlight Pulse ────────────────────── */
        .spotlight-ring {
            position: absolute; inset: -5px;
            border: 2.5px dashed var(--c-adj);
            border-radius: 16px;
            animation: pulse 1.8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }

        /* ─── Noun Slot ──────────────────────────── */
        .noun-slot {
            border: 2px dashed rgba(255,165,82,0.4);
            background: rgba(255,165,82,0.06);
            min-width: clamp(80px,14vw,140px);
            min-height: clamp(40px,6vw,60px);
        }
    </style>
</head>
<body>
<div id="stage">
    <div class="amb" id="amb1"></div>
    <div class="amb" id="amb2"></div>
    <div class="scanline"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="step-label" id="stepLabel">Intro</div>
        <div class="top-controls">
            <div class="ctrl-btn" id="pauseBtn">⏸️</div>
            <div class="ctrl-btn" id="musicBtn">🔇</div>
        </div>
    </div>

    <!-- Pause Banner -->
    <div id="pauseBanner">
        <div class="p-left">
            <span class="p-icon">⏸️</span>
            <div>
                <div class="p-title">Paused</div>
                <div class="p-hint">Content stays visible — take your time</div>
            </div>
        </div>
        <button class="resume-btn" onclick="togglePause()">▶ Resume</button>
    </div>

    <!-- Scene Area -->
    <div id="scene-area">
        <div id="title-group">
            <div class="main-title">Complex<br><em>Sentences</em></div>
            <div class="level-badge">Level 3 Grammar</div>
        </div>

        <!-- Reusable scene row (rebuilt each step) -->
        <div class="scene-row" id="sceneRow"></div>

        <!-- Level comparison strip -->
        <div id="level-strip">
            <div class="lvl-row" id="lvl1">
                <span class="lvl-num lvl-1">Level 1</span>
                <span class="lvl-text">Simple — One independent clause</span>
                <span class="lvl-cn">一個獨立子句</span>
            </div>
            <div class="lvl-row" id="lvl2">
                <span class="lvl-num lvl-2">Level 2</span>
                <span class="lvl-text">Compound — Two clauses + FANBOYS</span>
                <span class="lvl-cn">兩個獨立句 + 連接詞</span>
            </div>
            <div class="lvl-row" id="lvl3">
                <span class="lvl-num lvl-3">Level 3</span>
                <span class="lvl-text">Complex — Main + Dependent clause</span>
                <span class="lvl-cn">主句 + 從屬子句</span>
            </div>
        </div>

        <!-- Type tag -->
        <div id="type-tag"></div>
    </div>

    <!-- Subtitles -->
    <div id="subtitle-area">
        <div class="sub-en" id="subEn"></div>
        <div class="sub-tc" id="subTc"></div>
    </div>

    <div class="progress-rail"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
/* ══════════════════════════════════════════════
   AUDIO
══════════════════════════════════════════════ */
const Audio = (() => {
    let ctx = null, muted = true, bgmTimer = null;
    function c() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
    function tone(f, type, dur, vol, delay = 0) {
        if (muted) return;
        const ac = c(), osc = ac.createOscillator(), g = ac.createGain();
        const t = ac.currentTime + delay;
        osc.type = type; osc.frequency.setValueAtTime(f, t);
        g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t + dur);
    }
    return {
        get muted() { return muted; },
        toggle() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            muted = !muted;
            if (!muted) { ctx.resume(); this.bgm(); } else { ctx.suspend(); clearInterval(bgmTimer); }
            return muted;
        },
        pop()     { tone(380 + Math.random()*140, 'triangle', 0.12, 0.04); },
        whoosh()  { tone(200,'triangle',0.4,0.04); tone(80,'triangle',0.4,0.02,0.15); },
        ding()    { tone(880,'sine',0.8,0.05); tone(1100,'sine',0.5,0.03,0.1); },
        chord()   { tone(392,'sine',1.0,0.04); tone(493.88,'sine',1.0,0.04,0.06); tone(587.33,'sine',1.0,0.04,0.13); },
        success() { tone(523.25,'sine',0.2,0.05); tone(659.25,'sine',0.35,0.05,0.15); tone(783.99,'sine',0.5,0.05,0.3); },
        bgm() {
            clearInterval(bgmTimer);
            const notes = [220,261.63,329.63,392,329.63,261.63]; let i = 0;
            bgmTimer = setInterval(() => { if(!muted) tone(notes[i=(i+1)%notes.length],'sine',1.8,0.01); }, 750);
        },
        suspend() { if(ctx) ctx.suspend(); clearInterval(bgmTimer); },
        resume()  { if(!muted && ctx) { ctx.resume(); this.bgm(); } }
    };
})();

/* ══════════════════════════════════════════════
   PAUSE SYSTEM
══════════════════════════════════════════════ */
let isPaused = false, pauseResolve = null, pausePromise = null;

function togglePause() {
    isPaused = !isPaused;
    const banner = document.getElementById('pauseBanner');
    const stageEl = document.getElementById('stage');
    const btn = document.getElementById('pauseBtn');
    if (isPaused) {
        banner.classList.add('active'); stageEl.classList.add('paused');
        btn.innerHTML = '▶️'; Audio.suspend();
        pausePromise = new Promise(r => { pauseResolve = r; });
    } else {
        banner.classList.remove('active'); stageEl.classList.remove('paused');
        btn.innerHTML = '⏸️'; Audio.resume();
        if (pauseResolve) { pauseResolve(); pauseResolve = null; }
    }
}

async function sleep(ms) {
    const deadline = Date.now() + ms;
    while (Date.now() < deadline) {
        if (isPaused) await pausePromise;
        const left = deadline - Date.now();
        if (left <= 0) break;
        await new Promise(r => setTimeout(r, Math.min(80, left)));
    }
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function setAmb(c1, c2) { $('amb1').style.background = c1; $('amb2').style.background = c2; }
function setStep(t) { $('stepLabel').textContent = t; }
function setSubs(en, tc) {
    const e = $('subEn'), t = $('subTc');
    e.classList.remove('show'); t.classList.remove('show');
    setTimeout(() => { e.textContent = en; t.textContent = tc; e.classList.add('show'); t.classList.add('show'); }, 320);
}
function setTypeTag(text, color) {
    const el = $('type-tag');
    el.classList.remove('show');
    if (text) {
        setTimeout(() => {
            el.textContent = text;
            el.style.color = color || 'var(--sub)';
            el.style.borderColor = color ? color + '55' : 'var(--border)';
            el.classList.add('show');
        }, 400);
    }
}
function hideTitle() {
    const tg = $('title-group');
    tg.classList.remove('show'); tg.style.display = 'none';
}
function showTitle() {
    const tg = $('title-group');
    tg.style.display = 'block';
    requestAnimationFrame(() => tg.classList.add('show'));
}

/* Build a clause block element */
function mkBlock(text, label, cls, extra = '') {
    const d = document.createElement('div');
    d.className = `clause-block ${cls} ${extra}`;
    d.innerHTML = `<span class="blk-label">${label}</span>${text}`;
    return d;
}

/* Animate a row of blocks in sequence */
async function showRow(items, rowEl) {
    rowEl.innerHTML = '';
    rowEl.classList.remove('show');
    await sleep(200);
    rowEl.classList.add('show');
    for (const item of items) {
        rowEl.appendChild(item.el);
        await sleep(80);
        requestAnimationFrame(() => item.el.classList.add('show'));
        Audio.pop();
        await sleep(item.delay || 450);
    }
}

function clearRow() {
    const r = $('sceneRow');
    r.innerHTML = ''; r.classList.remove('show');
}

/* ══════════════════════════════════════════════
   TIMELINE
══════════════════════════════════════════════ */
const TIMELINE = [
    // 0 ─ Intro title
    { dur: 4000, label: 'Welcome', amb: ['#7EC8E3','#FFB3C6'], fn: async () => {
        showTitle();
        Audio.chord();
        setSubs("Welcome to Level 3 Grammar.", "歡迎來到第三級文法。");
    }},

    // 1 ─ The 3 levels recap
    { dur: 5500, label: 'Recap', amb: ['#7EC8E3','#FFD166'], fn: async () => {
        hideTitle();
        clearRow();
        const strip = $('level-strip');
        strip.style.display = 'flex';
        await sleep(200);
        strip.classList.add('show');
        const rows = ['lvl1','lvl2','lvl3'];
        for (let i = 0; i < rows.length; i++) {
            await sleep(320);
            $(rows[i]).classList.add('show');
            Audio.pop();
        }
        setSubs("Let's review all three sentence levels.", "先回顧三個句型等級。");
    }},

    // 2 ─ Level 1 example
    { dur: 5000, label: 'Level 1 Review', amb: ['#7EC8E3','#6EE7B7'], fn: async () => {
        $('level-strip').classList.remove('show');
        await sleep(400); $('level-strip').style.display = 'none';
        const b = mkBlock('I like music', 'Simple Sentence', 'blk-main');
        await showRow([{ el: b, delay: 0 }], $('sceneRow'));
        setTypeTag('Level 1 · S + V — one complete idea', 'var(--c-main)');
        setSubs("Level 1: One independent clause. Short and strong.", "Level 1：一個獨立子句。簡短有力。");
    }},

    // 3 ─ Level 2 example
    { dur: 5500, label: 'Level 2 Review', amb: ['#FFD166','#7EC8E3'], fn: async () => {
        setTypeTag('');
        clearRow();
        const b1   = mkBlock('I sing', '句子 1', 'blk-main');
        const conj = mkBlock(', but', 'FANBOYS', 'blk-conj blk-dep clause-block');
        const b2   = mkBlock('she dances', '句子 2', 'blk-main');
        await showRow([
            { el: b1, delay: 450 },
            { el: conj, delay: 400 },
            { el: b2, delay: 0 }
        ], $('sceneRow'));
        setTypeTag('Level 2 · Two independent clauses joined by FANBOYS', 'var(--c-conj)');
        setSubs("Level 2: Two equal sentences joined by a conjunction.", "Level 2：兩個對等句子，由連接詞黏在一起。");
    }},

    // 4 ─ Level 3 intro
    { dur: 4500, label: 'Level 3 Intro', amb: ['#FFB3C6','#C9B1FF'], fn: async () => {
        setTypeTag('');
        clearRow();
        const main = mkBlock('Main Clause', '主要子句 (獨立)', 'blk-main');

/* ══════════════════════════════════════════════
   PLAYER
══════════════════════════════════════════════ */
async function play() {
    const total = TIMELINE.reduce((s, t) => s + t.dur, 0);
    let elapsed = 0;
    const barTimer = setInterval(() => {
        if (!isPaused) elapsed += 80;
        $('progressFill').style.width = `${Math.min((elapsed / total) * 100, 100)}%`;
        if (elapsed >= total) clearInterval(barTimer);
    }, 80);

    for (let i = 0; i < TIMELINE.length; i++) {
        const step = TIMELINE[i];
        setStep(step.label);
        if (step.amb) setAmb(step.amb[0], step.amb[1]);
        await step.fn();
        await sleep(step.dur - 100);
    }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
document.getElementById('pauseBtn').onclick = togglePause;
document.getElementById('musicBtn').onclick = () => {
    const m = Audio.toggle();
    $('musicBtn').innerHTML = m ? '🔇' : '🔊';
};

window.onload = () => {
    setTimeout(() => {
        Audio.toggle(); $('musicBtn').innerHTML = '🔊';
        play();
    }, 400);
};

let lastT = 0;
document.addEventListener('touchend', e => { const n = Date.now(); if (n - lastT < 300) e.preventDefault(); lastT = n; }, false);
document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
</script>
