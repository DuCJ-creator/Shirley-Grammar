<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 4: Compound-Complex Sentences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #12151F;
            --stage:  #1A1E2E;
            --card:   #252A3D;
            --border: rgba(255,255,255,0.07);
            --text:   #E8ECFF;
            --sub:    #7B82B0;
            --dim:    #3C4260;

            /* clause colors — consistent with series */
            --c-ic:   #7EC8E3;   /* independent clause - sky blue */
            --c-dc:   #FFB3C6;   /* dependent clause - rose pink */
            --c-conn: #FFD166;   /* connector/FANBOYS - gold */

            /* difficulty tier colors */
            --d-low:    #6EE7B7;
            --d-mid:    #C9B1FF;
            --d-high:   #FFA552;
            --d-master: #FFD166;

            --font-en: 'Nunito', sans-serif;
            --font-cn: 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: #0A0C14;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-en);
            overflow: hidden;
        }

        /* ─── Stage (16:9) ───────────────────────── */
        #stage {
            width: min(100vw, calc(100vh * 16/9));
            height: min(100vh, calc(100vw * 9/16));
            background: var(--stage);
            position: relative; overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }

        /* ─── Ambient Glow ───────────────────────── */
        .amb {
            position: absolute; border-radius: 50%;
            filter: blur(90px); opacity: 0.14;
            pointer-events: none; z-index: 0;
            transition: background 1.8s ease;
        }
        #amb1 { width: 55%; height: 90%; top: -25%; left: -10%; background: var(--c-ic); }
        #amb2 { width: 45%; height: 70%; bottom: -20%; right: -8%; background: var(--c-dc); }

        .scanline {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
        }

        /* ─── Top Bar ────────────────────────────── */
        .top-bar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: clamp(10px,1.8%,18px) clamp(14px,3%,28px);
        }

        .step-label {
            font-size: clamp(0.6rem,1.1vw,0.82rem);
            font-weight: 700; color: var(--sub);
            letter-spacing: 1.2px; text-transform: uppercase;
        }

        .top-controls { display: flex; gap: 10px; }

        .ctrl-btn {
            width: clamp(32px,4vw,42px); height: clamp(32px,4vw,42px);
            border-radius: 50%; border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.05); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(0.85rem,1.4vw,1.05rem);
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.11); transform: scale(1.1); }

        /* ─── Pause Banner ───────────────────────── */
        #pauseBanner {
            position: absolute; top: 0; left: 0; right: 0; z-index: 80;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: clamp(8px,1.4%,14px) clamp(14px,3%,28px);
            background: rgba(6,8,16,0.93); backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--border);
            opacity: 0; pointer-events: none;
            transform: translateY(-100%);
            transition: opacity 0.3s, transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        #pauseBanner.active { opacity: 1; pointer-events: all; transform: translateY(0); }

        .p-left { display: flex; align-items: center; gap: 10px; }
        .p-icon  { font-size: clamp(1rem,2vw,1.3rem); }
        .p-title { font-size: clamp(0.8rem,1.4vw,1rem); font-weight: 800; color: var(--text); }
        .p-hint  { font-size: clamp(0.62rem,1vw,0.78rem); color: var(--sub); }
        .resume-btn {
            padding: clamp(5px,0.8%,8px) clamp(14px,2.5%,20px);
            background: var(--c-ic); color: #0A0C14;
            border: none; border-radius: 20px;
            font-family: var(--font-en); font-size: clamp(0.75rem,1.3vw,0.9rem); font-weight: 800;
            cursor: pointer; white-space: nowrap; transition: transform 0.15s;
        }
        .resume-btn:hover { transform: scale(1.05); }

        /* Dim lesson content while paused */
        #stage.paused #scene-area,
        #stage.paused #subtitle-area { filter: brightness(0.58); transition: filter 0.3s; }

        /* ─── Scene Area ─────────────────────────── */
        #scene-area {
            position: absolute;
            top: 11%; left: 0; right: 0; bottom: 22%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
            gap: clamp(10px,2%,20px);
        }

        /* ─── Title Group ────────────────────────── */
        #title-group {
            text-align: center;
            opacity: 0; transform: translateY(-14px);
            transition: opacity 0.7s, transform 0.7s;
        }
        #title-group.show { opacity: 1; transform: translateY(0); }

        .main-title {
            font-size: clamp(1.6rem,4.5vw,3.8rem);
            font-weight: 900; color: var(--text);
            letter-spacing: -1px; line-height: 1.05;
        }
        .main-title em { font-style: normal; color: var(--c-conn); }

        .level-badge {
            display: inline-block; margin-top: 8px;
            padding: 4px 14px; border: 1.5px solid var(--border); border-radius: 20px;
            font-size: clamp(0.65rem,1.1vw,0.85rem); font-weight: 700;
            color: var(--sub); letter-spacing: 2px; text-transform: uppercase;
        }

        /* ─── Formula Row ────────────────────────── */
        #formula-row {
            display: flex; align-items: center; justify-content: center;
            gap: clamp(6px,1.2vw,14px);
            flex-wrap: wrap;
            width: 90%;
            opacity: 0; transition: opacity 0.5s;
        }
        #formula-row.show { opacity: 1; }

        .f-block {
            padding: clamp(8px,1.4%,14px) clamp(12px,2.2%,22px);
            border-radius: 12px;
            font-size: clamp(0.75rem,1.6vw,1.1rem);
            font-weight: 800; text-align: center;
            opacity: 0; transform: scale(0.85);
            transition: all 0.5s cubic-bezier(0.34,1.4,0.64,1);
        }
        .f-block.show { opacity: 1; transform: scale(1); }

        .f-ic {
            background: rgba(126,200,227,0.15);
            border: 2px solid var(--c-ic); color: var(--c-ic);
        }
        .f-dc {
            background: rgba(255,179,198,0.15);
            border: 2px solid var(--c-dc); color: var(--c-dc);
        }
        .f-plus {
            font-size: clamp(1.2rem,2.5vw,2rem);
            font-weight: 900; color: var(--dim);
            opacity: 0; transition: opacity 0.4s;
        }
        .f-plus.show { opacity: 1; }

        /* ─── Sentence Blocks Row ────────────────── */
        #sentence-row {
            display: flex; align-items: center; justify-content: center;
            flex-wrap: wrap;
            gap: clamp(6px,1.2vw,12px);
            width: 92%;
            opacity: 0; transition: opacity 0.4s;
            min-height: clamp(60px,9vw,100px);
        }
        #sentence-row.show { opacity: 1; }

        .sent-block {
            padding: clamp(10px,1.6%,18px) clamp(12px,2%,22px);
            border-radius: 14px;
            font-size: clamp(0.8rem,1.7vw,1.25rem);
            font-weight: 800; color: #111;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            opacity: 0; transform: translateY(12px) scale(0.92);
            transition: all 0.5s cubic-bezier(0.34,1.4,0.64,1);
            position: relative;
        }
        .sent-block.show { opacity: 1; transform: translateY(0) scale(1); }

        .sent-block .blk-label {
            display: block;
            font-size: clamp(0.48rem,0.85vw,0.65rem);
            font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; opacity: 0.65;
            margin-bottom: 4px;
        }

        .b-ic   { background: var(--c-ic);   }
        .b-dc   { background: var(--c-dc);   }
        .b-conn { background: var(--c-conn); }

        /* ─── Difficulty Badge ───────────────────── */
        #diff-badge {
            font-size: clamp(0.65rem,1.1vw,0.85rem);
            font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
            padding: 5px 16px; border-radius: 20px;
            border: 1.5px solid var(--border);
            color: var(--sub);
            opacity: 0; transform: translateY(6px);
            transition: all 0.45s 0.2s;
        }
        #diff-badge.show { opacity: 1; transform: translateY(0); }

        /* ─── Type Tag ───────────────────────────── */
        #type-tag {
            font-size: clamp(0.62rem,1.1vw,0.85rem);
            font-weight: 600; color: var(--sub);
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 16px;
            opacity: 0; transform: translateY(6px);
            transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
            text-align: center; max-width: 90%;
        }
        #type-tag.show { opacity: 1; transform: translateY(0); }

        /* ─── Subtitle Area ──────────────────────── */
        #subtitle-area {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 22%; z-index: 20;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 0 5% 2%; gap: 5px;
            background: linear-gradient(to top, rgba(8,10,18,0.96) 55%, transparent);
        }

        .sub-en {
            font-size: clamp(0.85rem,1.9vw,1.4rem);
            font-weight: 700; color: #fff; text-align: center; line-height: 1.35;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.45s, transform 0.45s;
        }
        .sub-tc {
            font-family: var(--font-cn);
            font-size: clamp(0.7rem,1.4vw,1rem);
            color: var(--sub); text-align: center; line-height: 1.45;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.45s 0.1s, transform 0.45s 0.1s;
        }
        .sub-en.show, .sub-tc.show { opacity: 1; transform: translateY(0); }

        /* ─── Progress ───────────────────────────── */
        .progress-rail {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: rgba(255,255,255,0.05); z-index: 30;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--c-ic), var(--c-dc));
            transition: width 0.15s linear;
        }
    </style>
</head>
<body>
<div id="stage">
    <div class="amb" id="amb1"></div>
    <div class="amb" id="amb2"></div>
    <div class="scanline"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="step-label" id="stepLabel">Intro</div>
        <div class="top-controls">
            <div class="ctrl-btn" id="pauseBtn">⏸️</div>
            <div class="ctrl-btn" id="musicBtn">🔇</div>
        </div>
    </div>

    <!-- Pause Banner -->
    <div id="pauseBanner">
        <div class="p-left">
            <span class="p-icon">⏸️</span>
            <div>
                <div class="p-title">Paused</div>
                <div class="p-hint">Content stays visible — take your time</div>
            </div>
        </div>
        <button class="resume-btn" onclick="togglePause()">▶ Resume</button>
    </div>

    <!-- Scene Area -->
    <div id="scene-area">
        <div id="title-group">
            <div class="main-title">Compound-<br><em>Complex</em></div>
            <div class="level-badge">Level 4 · Advanced Grammar</div>
        </div>

        <div id="formula-row">
            <div class="f-block f-ic" id="fb1">Indep. Clause 1</div>
            <div class="f-plus" id="fp1">+</div>
            <div class="f-block f-ic" id="fb2">Indep. Clause 2</div>
            <div class="f-plus" id="fp2">+</div>
            <div class="f-block f-dc" id="fb3">Dep. Clause</div>
        </div>

        <div id="sentence-row"></div>

        <div id="diff-badge"></div>
        <div id="type-tag"></div>
    </div>

    <!-- Subtitles -->
    <div id="subtitle-area">
        <div class="sub-en" id="subEn"></div>
        <div class="sub-tc" id="subTc"></div>
    </div>

    <div class="progress-rail"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
/* ══════════════════════════════════════════════
   AUDIO
══════════════════════════════════════════════ */
const Audio = (() => {
    let ctx = null, muted = true, bgmTimer = null;
    function c() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
    function tone(f, type, dur, vol, delay = 0) {
        if (muted) return;
        const ac = c(), osc = ac.createOscillator(), g = ac.createGain();
        const t = ac.currentTime + delay;
        osc.type = type; osc.frequency.setValueAtTime(f, t);
        g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t + dur);
    }
    return {
        get muted() { return muted; },
        toggle() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            muted = !muted;
            if (!muted) { ctx.resume(); this.bgm(); } else { ctx.suspend(); clearInterval(bgmTimer); }
            return muted;
        },
        pop()     { tone(380 + Math.random()*140, 'triangle', 0.12, 0.04); },
        snap()    { tone(200,'triangle',0.12,0.05); tone(120,'triangle',0.08,0.03,0.06); },
        whoosh()  { tone(220,'triangle',0.4,0.04); tone(90,'triangle',0.4,0.025,0.18); },
        ding()    { tone(880,'sine',0.8,0.05); tone(1100,'sine',0.5,0.03,0.1); },
        chord()   { tone(392,'sine',1.0,0.04); tone(493.88,'sine',1.0,0.04,0.06); tone(587.33,'sine',1.0,0.04,0.13); },
        success() { tone(523.25,'sine',0.2,0.05); tone(659.25,'sine',0.35,0.05,0.15); tone(783.99,'sine',0.5,0.05,0.3); },
        bgm() {
            clearInterval(bgmTimer);
            const notes = [246.94,293.66,369.99,440,369.99,293.66]; let i = 0;
            bgmTimer = setInterval(() => { if(!muted) tone(notes[i=(i+1)%notes.length],'sine',1.8,0.011); }, 750);
        },
        suspend() { if(ctx) ctx.suspend(); clearInterval(bgmTimer); },
        resume()  { if(!muted && ctx) { ctx.resume(); this.bgm(); } }
    };
})();

/* ══════════════════════════════════════════════
   PAUSE SYSTEM
══════════════════════════════════════════════ */
let isPaused = false, pauseResolve = null, pausePromise = null;

function togglePause() {
    isPaused = !isPaused;
    const banner = document.getElementById('pauseBanner');
    const stageEl = document.getElementById('stage');
    const btn = document.getElementById('pauseBtn');
    if (isPaused) {
        banner.classList.add('active'); stageEl.classList.add('paused');
        btn.innerHTML = '▶️'; Audio.suspend();
        pausePromise = new Promise(r => { pauseResolve = r; });
    } else {
        banner.classList.remove('active'); stageEl.classList.remove('paused');
        btn.innerHTML = '⏸️'; Audio.resume();
        if (pauseResolve) { pauseResolve(); pauseResolve = null; }
    }
}

async function sleep(ms) {
    const deadline = Date.now() + ms;
    while (Date.now() < deadline) {
        if (isPaused) await pausePromise;
        const left = deadline - Date.now();
        if (left <= 0) break;
        await new Promise(r => setTimeout(r, Math.min(80, left)));
    }
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function setAmb(c1, c2) { $('amb1').style.background = c1; $('amb2').style.background = c2; }
function setStep(t) { $('stepLabel').textContent = t; }

function setSubs(en, tc) {
    const e = $('subEn'), t = $('subTc');
    e.classList.remove('show'); t.classList.remove('show');
    setTimeout(() => { e.textContent = en; t.textContent = tc; e.classList.add('show'); t.classList.add('show'); }, 320);
}

function setTag(text, color) {
    const el = $('type-tag');
    el.classList.remove('show');
    if (text) {
        setTimeout(() => {
            el.textContent = text;
            el.style.color = color || 'var(--sub)';
            el.style.borderColor = color ? color + '55' : 'var(--border)';
            el.classList.add('show');
        }, 380);
    }
}

function setDiff(label, color) {
    const el = $('diff-badge');
    el.classList.remove('show');
    setTimeout(() => {
        el.textContent = label;
        el.style.color = color;
        el.style.borderColor = color + '55';
        el.style.background = color + '18';
        el.classList.add('show');
        Audio.ding();
    }, 200);
}

function clearScene() {
    const row = $('sentence-row');
    row.innerHTML = ''; row.classList.remove('show');
    $('diff-badge').classList.remove('show');
    $('type-tag').classList.remove('show');
}

/* Add one block to the sentence row */
async function addBlock(text, label, cls) {
    const row = $('sentence-row');
    if (!row.classList.contains('show')) row.classList.add('show');
    const d = document.createElement('div');
    d.className = `sent-block ${cls}`;
    d.innerHTML = `<span class="blk-label">${label}</span>${text}`;
    row.appendChild(d);
    await sleep(60);
    d.classList.add('show');
    cls === 'b-conn' ? Audio.snap() : Audio.pop();
}

/* ══════════════════════════════════════════════
   TIMELINE
══════════════════════════════════════════════ */
const TIMELINE = [
    // 0 — Title
    { dur: 4500, label: 'Intro', amb: ['#7EC8E3','#FFB3C6'], fn: async () => {
        $('title-group').classList.add('show');
        Audio.chord();
        setSubs("Level 4: Compound-Complex Sentences — the most powerful sentence type.", "第四級：複合複雜句——最強大的句型。");
    }},

    // 1 — What is it?
    { dur: 5000, label: 'Definition', amb: ['#7EC8E3','#C9B1FF'], fn: async () => {
        setSubs("They combine at least 2 Independent Clauses and 1 Dependent Clause.", "結合至少兩個獨立子句和一個從屬子句。");
    }},

    // 2 — Formula reveal
    { dur: 6000, label: 'The Formula', amb: ['#FFD166','#7EC8E3'], fn: async () => {
        $('title-group').classList.remove('show');
        await sleep(400);
        $('title-group').style.display = 'none';

        const fr = $('formula-row');
        fr.classList.add('show');

        const seqIds = ['fb1','fp1','fb2','fp2','fb3'];
        for (const id of seqIds) {
            await sleep(380);
            $(id).classList.add('show');
            Audio.pop();
        }
        setSubs("The formula: IC + IC + DC (in any order).", "公式：獨立子句 + 獨立子句 + 從屬子句（順序可變）。");
    }},

    // 3 — Connector reminder
    { dur: 4500, label: 'Connectors', amb: ['#FFD166','#FFB3C6'], fn: async () => {
        setTag('IC + IC are joined by FANBOYS (and / but / or / so…)', 'var(--c-conn)');
        setSubs("The two Independent Clauses are linked with a FANBOYS conjunction.", "兩個獨立子句用 FANBOYS 連接詞連接。");
    }},

    // 4 — DC reminder
    { dur: 4500, label: 'Dependent Clause', amb: ['#FFB3C6','#C9B1FF'], fn: async () => {
        setTag('DC is introduced by a subordinator: because / although / when / if…', 'var(--c-dc)');
        setSubs("The Dependent Clause uses a subordinating conjunction.", "從屬子句使用從屬連接詞引導。");
    }},

    // 5 — LOW example intro
    { dur: 3500, label: 'Level: Basic', amb: ['#6EE7B7','#7EC8E3'], fn: async () => {
        setTag('');
        clearScene();
        $('formula-row').classList.remove('show');
        setDiff('● BASIC', 'var(--d-low)');
        Audio.whoosh();
        setSubs("Let's start with a basic example.", "先從基本例句開始。");
    }},

    // 6 — LOW example build
    { dur: 7000, label: 'Level: Basic', amb: ['#6EE7B7','#7EC8E3'], fn: async () => {
        await addBlock('Because I was hungry,', '從屬子句 · DC', 'b-dc');
        await sleep(600);
        await addBlock('I cooked pasta,', '獨立子句 1 · IC', 'b-ic');
        await sleep(500);
        await addBlock('and', 'FANBOYS', 'b-conn');
        await sleep(400);
        await addBlock('I ate it all.', '獨立子句 2 · IC', 'b-ic');
        setTag('DC first → comma required  |  IC + and + IC', 'var(--d-low)');
        setSubs("Because I was hungry, I cooked pasta, and I ate it all.", "因為我很餓，我煮了義大利麵，而且把它全吃光了。");
    }},

    // 7 — LOW analysis
    { dur: 5500, label: 'Level: Basic', amb: ['#6EE7B7','#7EC8E3'], fn: async () => {
        setSubs('"Because" = subordinator  |  "," = DC-first comma  |  "and" = FANBOYS', '「Because」引導從屬子句 ｜ 逗號因從屬子句在前 ｜ and 連接兩個獨立子句');
    }},

    // 8 — MEDIUM example intro
    { dur: 3500, label: 'Level: Intermediate', amb: ['#C9B1FF','#7EC8E3'], fn: async () => {
        clearScene();
        setDiff('●● INTERMEDIATE', 'var(--d-mid)');
        Audio.whoosh();
        setSubs("Now a more complex example.", "現在來看更複雜的例句。");
    }},

    // 9 — MEDIUM example build
    { dur: 7000, label: 'Level: Intermediate', amb: ['#C9B1FF','#FFB3C6'], fn: async () => {
        await addBlock('Although it was raining,', '從屬子句 · DC', 'b-dc');
        await sleep(600);

/* ══════════════════════════════════════════════
   PLAYER
══════════════════════════════════════════════ */
async function play() {
    const total = TIMELINE.reduce((s, t) => s + t.dur, 0);
    let elapsed = 0;
    const barTimer = setInterval(() => {
        if (!isPaused) elapsed += 80;
        $('progressFill').style.width = `${Math.min((elapsed / total) * 100, 100)}%`;
        if (elapsed >= total) clearInterval(barTimer);
    }, 80);

    for (let i = 0; i < TIMELINE.length; i++) {
        const step = TIMELINE[i];
        setStep(step.label);
        if (step.amb) setAmb(step.amb[0], step.amb[1]);
        await step.fn();
        await sleep(step.dur - 100);
    }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
document.getElementById('pauseBtn').onclick = togglePause;
document.getElementById('musicBtn').onclick = () => {
    const m = Audio.toggle();
    $('musicBtn').innerHTML = m ? '🔇' : '🔊';
};

window.onload = () => {
    setTimeout(() => {
        Audio.toggle(); $('musicBtn').innerHTML = '🔊';
        play();
    }, 400);
};

let lastT = 0;
document.addEventListener('touchend', e => { const n = Date.now(); if (n - lastT < 300) e.preventDefault(); lastT = n; }, false);
document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
</script>
