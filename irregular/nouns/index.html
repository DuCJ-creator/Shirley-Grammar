<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Irregular Nouns | Master Class</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-gradient: linear-gradient(135deg, #10b981, #047857);
      --accent: #f59e0b;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --bg-color: #f0fdf4;
      --glass-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(255, 255, 255, 0.8);
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 25px -5px rgba(16, 185, 129, 0.15);
      --radius: 20px;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, hsla(152, 40%, 90%, 1) 0, transparent 50%), 
        radial-gradient(at 100% 100%, hsla(180, 40%, 90%, 1) 0, transparent 50%);
      background-size: 100% 100vh;
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px 10px;
    }

    .container { max-width: 800px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 20px; animation: fadeInDown 0.8s ease; }
    h1 { font-size: 1.8rem; font-weight: 800; color: #064e3b; margin-bottom: 5px; }
    .description { font-size: 0.9rem; color: var(--text-sub); }

    .content-area {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-md);
      min-height: 60vh;
    }

    .controls-wrapper { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }

    .mode-bar { display: flex; background: #e2e8f0; padding: 4px; border-radius: 14px; width: fit-content; margin: 0 auto; }
    .mode-btn { border: none; background: transparent; padding: 8px 16px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
    .mode-btn.active { background: white; color: var(--primary-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* Flashcard Toggle */
    .view-toggle-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .view-btn { padding: 5px 12px; font-size: 0.8rem; border-radius: 20px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600; color: var(--text-sub); }
    .view-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .search-wrap { position: relative; width: 100%; }
    .search-wrap input { width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px; border: 2px solid transparent; background: white; font-size: 1rem; box-shadow: var(--shadow-sm); }
    .search-wrap input:focus { border-color: var(--primary); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

    .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
    .filter-btn { padding: 5px 12px; background: white; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: var(--text-sub); cursor: pointer; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-btn.star-filter { border-color: var(--accent); color: var(--accent); }
    .filter-btn.star-filter.active { background: var(--accent); color: white; }

    .section { display: none; }
    .section.active { display: block; }

    /* Noun Card Styles */
    .noun-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .noun-card { background: white; border-radius: 16px; padding: 18px; border: 1px solid #f1f5f9; position: relative; transition: 0.3s; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    
    .star-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; filter: grayscale(1); opacity: 0.3; transition: 0.2s; }
    .star-btn.active { filter: grayscale(0); opacity: 1; }

    .word-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: #f8fafc; padding: 8px 12px; border-radius: 10px; }
    .label { font-size: 0.7rem; color: #94a3b8; font-weight: 800; width: 40px; }
    .word-content { font-size: 1rem; font-weight: 700; color: #334155; flex: 1; }
    .audio-btn { background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; }

    /* Flashcard Style */
    .flashcard-container { perspective: 1000px; width: 100%; max-width: 400px; margin: 20px auto; height: 320px; position: relative; }
    .flashcard { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; }
    .flashcard.flipped { transform: rotateY(180deg); }
    .flashcard-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid white; text-align: center; }
    .face-front { background: white; color: var(--text-main); }
    .face-back { background: var(--primary-gradient); color: white; transform: rotateY(180deg); }
    
    .fc-nav { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
    .fc-btn { background: white; border: 1px solid #e2e8f0; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }

    /* Review Slider */
    .review-slider { overflow: hidden; position: relative; width: 100%; }
    .review-track { display: flex; transition: transform 0.3s ease-out; }
    .review-slide { min-width: 100%; padding: 10px; }

    .hidden { display: none !important; }
    .empty { text-align: center; padding: 40px; color: var(--text-sub); }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Shirley's Irregular Nouns Master Pro</h1>
    <div class="description">Master Singular & Plural Forms</div>
  </header>

  <div class="content-area">
    <div class="controls-wrapper">
      <div class="mode-bar">
        <button class="mode-btn active" data-mode="learn">📚 Learn</button>
        <button class="mode-btn" data-mode="review">✏️ Review</button>
        <button class="mode-btn" data-mode="quiz">🏆 Quiz</button>
      </div>

      <div id="standard-controls">
        <div class="view-toggle-bar" id="learn-view-toggle">
          <button class="view-btn active" data-view="overview">Overview</button>
          <button class="view-btn" data-view="flashcard">Flashcards</button>
        </div>

        <div class="search-wrap">
          <div class="search-icon">🔍</div>
          <input id="search-input" type="text" placeholder="Search nouns..." />
        </div>

        <div class="filter-bar" id="category-filters"></div>
      </div>
    </div>

    <div id="learn-section" class="section active">
      <div id="learn-overview" class="noun-grid"></div>
      
      <div id="learn-flashcard" class="hidden">
        <div class="flashcard-container" id="fc-container">
          <div class="flashcard" id="main-flashcard">
            <div class="flashcard-face face-front" id="fc-front"></div>
            <div class="flashcard-face face-back" id="fc-back"></div>
          </div>
        </div>
        <div class="fc-nav">
          <button class="fc-btn" id="fc-prev">←</button>
          <span id="fc-counter" style="font-weight:700; color:var(--text-sub)">0 / 0</span>
          <button class="fc-btn" id="fc-next">→</button>
        </div>
      </div>
    </div>

    <div id="review-section" class="section">
      <div class="review-slider" id="review-slider-area">
        <div class="review-track" id="review-track"></div>
      </div>
      <div class="fc-nav" style="margin-top:15px;">
        <button class="fc-btn" id="rev-prev">←</button>
        <span id="rev-counter" style="font-weight:700; color:var(--text-sub)">0 / 0</span>
        <button class="fc-btn" id="rev-next">→</button>
      </div>
    </div>

    <div id="quiz-section" class="section">
        <div id="quiz-start" style="text-align:center; padding:40px;">
            <button class="mode-btn active" id="btn-start-quiz" style="padding:15px 40px; font-size:1.1rem; border-radius:30px;">Start Quiz</button>
        </div>
        <div id="quiz-game" class="hidden">
            <div id="quiz-list"></div>
            <button id="btn-submit-quiz" class="mode-btn active" style="width:100%; margin-top:20px; padding:15px;">Submit</button>
        </div>
        <div id="quiz-result" class="hidden"></div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://ducj-creator.github.io/Shirley-Grammar/irregular/nouns.csv";
  
  let allNouns = [];
  let favorites = JSON.parse(localStorage.getItem('shirley_fav_nouns') || '[]');
  let categories = new Map();
  let appState = {
    mode: 'learn',
    view: 'overview',
    category: 'all',
    search: '',
    currentIndex: 0
  };

  /* INIT */
  document.addEventListener("DOMContentLoaded", async () => {
    bindControls();
    await fetchData();
    renderCategories();
    renderMain();
  });

  async function fetchData() {
    try {
      const res = await fetch(CSV_URL, {cache:"no-store"});
      const text = await res.text();
      parseCSV(text);
    } catch (err) { console.error(err); }
  }

  function parseCSV(text) {
    const rows = text.trim().split(/\r?\n/).filter(Boolean);
    const headers = rows[0].split(',').map(h => h.trim().toLowerCase().replace(/^\uFEFF/, ''));
    const idx = {
      cat: headers.findIndex(h => h.includes('category')),
      sing: headers.findIndex(h => h.includes('singular')),
      pl: headers.findIndex(h => h.includes('plural')),
      zh: headers.findIndex(h => h.includes('chinese')),
      s_sent: headers.findIndex(h => h.includes('singular sentence')),
      p_sent: headers.findIndex(h => h.includes('plural sentence'))
    };

    allNouns = rows.slice(1).map((row, i) => {
      const cols = splitCSV(row);
      const catRaw = (cols[idx.cat]||"Other").trim();
      const catKey = catRaw.match(/\d+/) ? catRaw.match(/\d+/)[0] : catRaw;
      if(!categories.has(catKey)) categories.set(catKey, catRaw);
      
      return {
        id: `noun-${i}`,
        category: catKey,
        catLabel: catRaw,
        singular: (cols[idx.sing]||"").trim(),
        plural: (cols[idx.pl]||"").trim(),
        chinese: (cols[idx.zh]||"").trim(),
        s_sent: (cols[idx.s_sent]||"").trim(),
        p_sent: (cols[idx.p_sent]||"").trim()
      };
    }).filter(n => n.singular && n.plural);
  }

  function splitCSV(str) {
    const res = []; let cur = ''; let inQ = false;
    for(let c of str){
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ){ res.push(cur); cur=''; }
      else cur+=c;
    }
    res.push(cur); return res;
  }

  /* CONTROLS */
  function bindControls() {
    // Mode Switch
    document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appState.mode = btn.dataset.mode;
        appState.currentIndex = 0;
        
        document.getElementById('standard-controls').className = (appState.mode === 'quiz') ? 'hidden' : '';
        document.getElementById('learn-view-toggle').className = (appState.mode === 'learn') ? 'view-toggle-bar' : 'hidden';
        
        switchSection();
        renderMain();
      };
    });

    // View Switch (Overview vs Flashcard)
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appState.view = btn.dataset.view;
        appState.currentIndex = 0;
        renderMain();
      };
    });

    document.getElementById('search-input').oninput = (e) => {
      appState.search = e.target.value.toLowerCase();
      appState.currentIndex = 0;
      renderMain();
    };

    // Nav Buttons
    document.getElementById('fc-next').onclick = () => moveSlide(1);
    document.getElementById('fc-prev').onclick = () => moveSlide(-1);
    document.getElementById('rev-next').onclick = () => moveSlide(1);
    document.getElementById('rev-prev').onclick = () => moveSlide(-1);

    // Flashcard Flip
    document.getElementById('main-flashcard').onclick = function() {
        this.classList.toggle('flipped');
    };

    // Gestures
    initTouch('fc-container');
    initTouch('review-slider-area');

    document.getElementById('btn-start-quiz').onclick = startQuiz;
    document.getElementById('btn-submit-quiz').onclick = submitQuiz;
  }

  function switchSection() {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(`${appState.mode}-section`).classList.add('active');
  }

  function renderCategories() {
    const container = document.getElementById('category-filters');
    let html = `<button class="filter-btn active" onclick="setCat('all', this)">All</button>`;
    html += `<button class="filter-btn star-filter" onclick="setCat('fav', this)">Starred 🌟</button>`;
    
    Array.from(categories.keys()).sort((a,b)=>a-b).forEach(k => {
      html += `<button class="filter-btn" onclick="setCat('${k}', this)">${categories.get(k)}</button>`;
    });
    container.innerHTML = html;
  }

  window.setCat = (cat, btn) => {
    appState.category = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    appState.currentIndex = 0;
    renderMain();
  };

  /* MAIN RENDERER */
  function getFilteredData() {
    let data = allNouns;
    if(appState.category === 'fav') data = allNouns.filter(n => favorites.includes(n.id));
    else if(appState.category !== 'all') data = allNouns.filter(n => n.category === appState.category);
    
    if(appState.search) {
      data = data.filter(n => n.singular.includes(appState.search) || n.chinese.includes(appState.search));
    }
    return data;
  }

  function renderMain() {
    const data = getFilteredData();
    
    if(appState.mode === 'learn') {
      if(appState.view === 'overview') {
        document.getElementById('learn-overview').classList.remove('hidden');
        document.getElementById('learn-flashcard').classList.add('hidden');
        renderOverview(data);
      } else {
        document.getElementById('learn-overview').classList.add('hidden');
        document.getElementById('learn-flashcard').classList.remove('hidden');
        renderFlashcard(data);
      }
    } else if (appState.mode === 'review') {
      renderReviewSlider(data);
    }
  }

  /* RENDER HELPERS */
  function renderOverview(data) {
    const container = document.getElementById('learn-overview');
    if(!data.length) return container.innerHTML = '<div class="empty">No items found</div>';
    
    container.innerHTML = data.map(item => `
      <div class="noun-card">
        <div class="card-header">
          <div><h3 style="font-size:1.2rem">${item.singular}</h3><p style="color:var(--text-sub)">${item.chinese}</p></div>
          <button class="star-btn ${favorites.includes(item.id)?'active':''}" onclick="toggleFav('${item.id}', this)">⭐</button>
        </div>
        <div class="word-row">
            <span class="label">SING</span><span class="word-content">${item.singular}</span>
            <button class="audio-btn" onclick="speak('${item.singular}')">🔊</button>
        </div>
        <div class="word-row" style="background:#ecfdf5; border:1px solid #d1fae5">
            <span class="label" style="color:var(--primary)">PLUR</span><span class="word-content" style="color:var(--primary-dark)">${item.plural}</span>
            <button class="audio-btn" onclick="speak('${item.plural}')">🔊</button>
        </div>
      </div>
    `).join('');
  }

  function renderFlashcard(data) {
    const counter = document.getElementById('fc-counter');
    if(!data.length) {
        document.getElementById('fc-container').style.display = 'none';
        counter.textContent = '0 / 0';
        return;
    }
    document.getElementById('fc-container').style.display = 'block';
    const item = data[appState.currentIndex];
    const card = document.getElementById('main-flashcard');
    card.classList.remove('flipped');

    document.getElementById('fc-front').innerHTML = `
        <div style="position:absolute; top:15px; right:15px">
            <button class="star-btn ${favorites.includes(item.id)?'active':''}" onclick="event.stopPropagation(); toggleFav('${item.id}', this)">⭐</button>
        </div>
        <div style="font-size:0.8rem; color:var(--primary); font-weight:800; margin-bottom:10px;">SINGULAR</div>
        <h2 style="font-size:2.5rem; margin-bottom:5px;">${item.singular}</h2>
        <div style="font-size:1.1rem; color:var(--text-sub); margin-bottom:20px;">${item.chinese}</div>
        <p style="font-style:italic; font-size:0.9rem; border-top:1px solid #eee; pt-10">${item.s_sent || ''}</p>
        <div style="margin-top:20px; font-size:0.8rem; opacity:0.5">Tap to flip</div>
    `;

    document.getElementById('fc-back').innerHTML = `
        <div style="font-size:0.8rem; font-weight:800; margin-bottom:10px; opacity:0.8">PLURAL</div>
        <h2 style="font-size:2.5rem; margin-bottom:10px;">${item.plural}</h2>
        <p style="font-size:1rem; opacity:0.9;">${item.p_sent || ''}</p>
        <button class="audio-btn" style="color:white; font-size:1.5rem; margin-top:20px;" onclick="event.stopPropagation(); speak('${item.plural}')">🔊</button>
    `;

    counter.textContent = `${appState.currentIndex + 1} / ${data.length}`;
  }

  function renderReviewSlider(data) {
    const track = document.getElementById('review-track');
    const counter = document.getElementById('rev-counter');
    if(!data.length) {
        track.innerHTML = '<div class="empty">No items to review</div>';
        counter.textContent = '0 / 0';
        return;
    }

    track.innerHTML = data.map(item => `
      <div class="review-slide">
        <div class="noun-card" style="max-width:400px; margin:0 auto; box-shadow:var(--shadow-md)">
            <div class="card-header">
                <div><h3>${item.singular}</h3><p>${item.chinese}</p></div>
                <button class="star-btn ${favorites.includes(item.id)?'active':''}" onclick="toggleFav('${item.id}', this)">⭐</button>
            </div>
            <div style="margin:20px 0;">
                <input type="text" class="review-input" style="width:100%; padding:12px; border-radius:10px; border:2px solid #e2e8f0;" 
                    placeholder="Type plural..." 
                    onkeypress="if(event.key==='Enter') checkReview(this, '${item.plural}')">
                <div class="feedback" style="margin-top:10px; font-weight:700; font-size:0.9rem; min-height:1.2em"></div>
            </div>
            <button class="view-btn" style="width:100%" onclick="this.previousElementSibling.querySelector('.feedback').innerHTML='Answer: <b>${item.plural}</b>'; speak('${item.plural}')">Show Answer</button>
        </div>
      </div>
    `).join('');
    
    updateSliderPos();
    counter.textContent = `${appState.currentIndex + 1} / ${data.length}`;
  }

  /* LOGIC */
  window.toggleFav = (id, btn) => {
    if(favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
        btn.classList.remove('active');
    } else {
        favorites.push(id);
        btn.classList.add('active');
    }
    localStorage.setItem('shirley_fav_nouns', JSON.stringify(favorites));
  };

  function moveSlide(dir) {
    const data = getFilteredData();
    if(!data.length) return;
    appState.currentIndex = (appState.currentIndex + dir + data.length) % data.length;
    
    if(appState.mode === 'learn' && appState.view === 'flashcard') renderFlashcard(data);
    else if(appState.mode === 'review') {
        updateSliderPos();
        document.getElementById('rev-counter').textContent = `${appState.currentIndex + 1} / ${data.length}`;
    }
  }

  function updateSliderPos() {
    const track = document.getElementById('review-track');
    track.style.transform = `translateX(-${appState.currentIndex * 100}%)`;
  }

  window.checkReview = (input, correct) => {
    const fb = input.nextElementSibling;
    if(input.value.trim().toLowerCase() === correct.toLowerCase()) {
        fb.innerHTML = '✨ Correct!'; fb.style.color = 'var(--success)';
        input.style.borderColor = 'var(--success)';
    } else {
        fb.innerHTML = 'Try again!'; fb.style.color = 'var(--danger)';
        input.style.borderColor = 'var(--danger)';
    }
  };

  function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }

  /* GESTURES */
  function initTouch(id) {
    const el = document.getElementById(id);
    let startX = 0;
    el.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    el.addEventListener('touchend', e => {
      let diff = startX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 50) moveSlide(diff > 0 ? 1 : -1);
    });
  }

  /* QUIZ (Simplified for brevity) */
  let quizData = [];
  function startQuiz() {
    quizData = [...allNouns].sort(() => 0.5 - Math.random()).slice(0, 10);
    document.getElementById('quiz-start').classList.add('hidden');
    document.getElementById('quiz-game').classList.remove('hidden');
    document.getElementById('quiz-list').innerHTML = quizData.map((item, i) => `
        <div class="noun-card" style="margin-bottom:10px;">
            <p><b>${i+1}. ${item.singular}</b> (${item.chinese})</p>
            <input type="text" class="review-input quiz-q" style="width:100%; margin-top:8px;" placeholder="Plural form...">
        </div>
    `).join('');
  }

  function submitQuiz() {
    const inputs = document.querySelectorAll('.quiz-q');
    let score = 0;
    let html = '';
    quizData.forEach((item, i) => {
        const userVal = inputs[i].value.trim().toLowerCase();
        const isCorrect = userVal === item.plural.toLowerCase();
        if(isCorrect) score += 10;
        html += `<div style="padding:10px; border-bottom:1px solid #eee; color:${isCorrect?'green':'red'}">
            ${i+1}. ${item.singular} → ${item.plural} (Your: ${userVal || 'none'})
        </div>`;
    });
    const res = document.getElementById('quiz-result');
    res.innerHTML = `<h2 style="text-align:center; margin-bottom:20px;">Score: ${score}/100</h2>` + html + 
                    `<button class="view-btn" style="width:100%; margin-top:20px;" onclick="location.reload()">Back</button>`;
    res.classList.remove('hidden');
    document.getElementById('quiz-game').classList.add('hidden');
  }

</script>
</body>
</html>
