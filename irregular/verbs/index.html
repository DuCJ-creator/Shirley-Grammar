<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shirley's Irregular Verbs | Final System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6; --text-main: #1e293b; --text-sub: #64748b;
      --bg-color: #eff6ff; --radius: 16px;
      --tag-aaa: #f59e0b; --tag-aba: #8b5cf6; --tag-abb: #10b981; --tag-abc: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: var(--bg-color); padding: 20px 10px; color: var(--text-main); }
    .container { max-width: 900px; margin: 0 auto; }
    .content-area { background: white; border-radius: var(--radius); padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); min-height: 80vh; }
    
    /* 模式切換 */
    .mode-bar { display: flex; background: #e2e8f0; padding: 4px; border-radius: 12px; width: fit-content; margin: 0 auto 20px; }
    .mode-btn { border: none; background: transparent; padding: 10px 20px; border-radius: 10px; font-weight: 700; color: var(--text-sub); cursor: pointer; }
    .mode-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    /* 搜尋與分類 */
    .control-panel { margin-bottom: 25px; }
    .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #cbd5e1; margin-bottom: 15px; font-size: 1rem; outline: none; }
    .filter-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; background: white; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-weight: 600; color: var(--text-sub); }
    .filter-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }

    /* 卡片設計 */
    .verb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .verb-card { background: white; border-radius: 14px; padding: 20px; border: 1px solid #f1f5f9; position: relative; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-title { font-size: 1.3rem; font-weight: 800; }
    .type-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; color: white; font-weight: 800; }
    
    .forms-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .form-box { background: #f8fafc; padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid #f1f5f9; }
    .form-label { font-size: 0.6rem; color: #94a3b8; font-weight: 800; display: block; margin-bottom: 4px; }
    .form-word { font-weight: 700; color: var(--text-main); }

    /* Review 模式 */
    .review-input { width: 100%; padding: 8px; border-radius: 8px; border: 2px solid #e2e8f0; text-align: center; font-size: 0.9rem; margin-top: 5px; outline: none; }
    .btn-review-check { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

    /* Quiz 區域 (嚴格隔離答案) */
    .quiz-item { background: white; border: 2px solid #e2e8f0; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
    .quiz-q-text { font-weight: 800; color: var(--primary); margin-bottom: 15px; font-size: 1.1rem; }
    .quiz-sentence { font-size: 1.1rem; color: #334155; padding: 15px; background: #f1f5f9; border-radius: 10px; border-left: 5px solid var(--primary); margin-bottom: 15px; line-height: 1.6; }
    .q-input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #cbd5e1; text-align: center; font-size: 1.1rem; outline: none; }
    .q-input:focus { border-color: var(--primary); }

    .feedback-box { margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: bold; display: none; }
    .fb-correct { background: #ecfdf5; color: #059669; display: block; }
    .fb-wrong { background: #fef2f2; color: #dc2626; display: block; }

    .note-box { background: #fff7ed; color: #9a3412; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: 10px; border-left: 4px solid #f59e0b; }
    .ex-toggle { font-size: 0.8rem; color: var(--primary); cursor: pointer; background: none; border: none; font-weight: 700; margin-top: 10px; }
    .ex-content { display: none; margin-top: 10px; padding: 12px; background: #f8fafc; border-radius: 10px; font-size: 0.9rem; color: #475569; }

    .hidden { display: none !important; }
    .type-AAA { background: var(--tag-aaa); } .type-ABA { background: var(--tag-aba); }
    .type-ABB { background: var(--tag-abb); } .type-ABC { background: var(--tag-abc); }
  </style>
</head>
<body>

<div class="container">
  <div class="content-area">
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="learn">📚 Study</button>
      <button class="mode-btn" data-mode="review">✏️ Review</button>
      <button class="mode-btn" data-mode="quiz">🏆 Quiz</button>
    </div>

    <div id="control-panel" class="control-panel">
      <input type="text" id="search-input" class="search-input" placeholder="搜尋單字或意思...">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="AAA">AAA</button>
        <button class="filter-btn" data-filter="ABA">ABA</button>
        <button class="filter-btn" data-filter="ABB">ABB</button>
        <button class="filter-btn" data-filter="ABC">ABC</button>
      </div>
    </div>

    <div id="main-grid" class="verb-grid"></div>

    <div id="quiz-section" class="hidden">
      <div style="text-align:center; margin-bottom:25px; display: flex; justify-content: center; gap: 10px;">
        <button id="q1-btn" style="padding:12px 20px; cursor:pointer; border-radius:10px; border:2px solid var(--primary); background:white; font-weight:bold; color:var(--primary);">Quiz 1: 三態填空</button>
        <button id="q2-btn" style="padding:12px 20px; cursor:pointer; border-radius:10px; border:2px solid var(--primary); background:white; font-weight:bold; color:var(--primary);">Quiz 2: 句子填空</button>
      </div>
      <div id="quiz-container"></div>
      <div id="quiz-controls" class="hidden">
        <button id="submit-quiz" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:20px; font-size:1.1rem;">Submit All Answers</button>
      </div>
    </div>
  </div>
</div>

<script>
  const VERBS_CSV = "https://ducj-creator.github.io/Shirley-Grammar/irregular/verbs.csv";
  const QUIZ_CSV = "https://ducj-creator.github.io/Shirley-Grammar/irregular/verbs%20quiz.csv";

  let verbs = [];
  let quizPool = [];
  let state = { mode: 'learn', filter: 'all', search: '', activeQuiz: [] };

  async function init() {
    const [vRes, qRes] = await Promise.all([
      fetch(VERBS_CSV + "?t=" + Date.now()).then(r => r.text()),
      fetch(QUIZ_CSV + "?t=" + Date.now()).then(r => r.text())
    ]);
    verbs = parseVerbs(vRes);
    quizPool = parseQuizCSV(qRes);
    renderMain();
    bindEvents();
  }

  function parseVerbs(csv) {
    const lines = csv.trim().split(/\r?\n/).filter(Boolean);
    return lines.slice(1).map(line => {
      const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return {
        type: (c[0]||"").match(/AAA|ABA|ABB|ABC/)?.[0] || "ABC",
        v1: (c[1]||"").trim(), meaning: (c[2]||"").trim(),
        ex1: (c[3]||"").trim(), v2: (c[4]||"").trim(), ex2: (c[5]||"").trim(),
        v3: (c[6]||"").trim(), ex3: (c[7]||"").trim(), note: (c[8]||"").trim()
      };
    }).filter(v => v.v1);
  }

  function parseQuizCSV(csv) {
    // 嚴格對應兩欄 CSV: Index 0=題目, Index 1=答案
    const lines = csv.trim().split(/\r?\n/).filter(Boolean);
    return lines.slice(1).map(line => {
      const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return { qText: (c[0]||"").trim(), answer: (c[1]||"").trim() };
    }).filter(q => q.qText);
  }

  function renderMain() {
    const grid = document.getElementById('main-grid');
    const ctrl = document.getElementById('control-panel');
    const quizArea = document.getElementById('quiz-section');

    if (state.mode === 'quiz') {
      grid.classList.add('hidden'); ctrl.classList.add('hidden');
      quizArea.classList.remove('hidden'); return;
    }

    grid.classList.remove('hidden'); ctrl.classList.remove('hidden');
    quizArea.classList.add('hidden');

    const filtered = verbs.filter(v => {
      const matchType = (state.filter === 'all' || v.type === state.filter);
      const matchSearch = v.v1.toLowerCase().includes(state.search) || v.meaning.includes(state.search);
      return matchType && matchSearch;
    });

    grid.innerHTML = filtered.map(v => state.mode === 'learn' ? buildLearnCard(v) : buildReviewCard(v)).join('');
  }

  function buildLearnCard(v) {
    return `
      <div class="verb-card">
        <div class="card-header">
          <div><div class="card-title">${v.v1}</div><div style="color:var(--text-sub);">${v.meaning}</div></div>
          <span class="type-badge type-${v.type}">${v.type}</span>
        </div>
        <div class="forms-row">
          <div class="form-box"><span class="form-label">V1</span><div class="form-word">${v.v1}</div></div>
          <div class="form-box"><span class="form-label">V2</span><div class="form-word">${v.v2}</div></div>
          <div class="form-box"><span class="form-label">V3</span><div class="form-word">${v.v3}</div></div>
        </div>
        ${v.note ? `<div class="note-box">💡 ${v.note}</div>` : ''}
        <button class="ex-toggle" onclick="toggleEx(this)">Show Examples ▼</button>
        <div class="ex-content"><b>V1:</b> ${v.ex1}<br><b>V2:</b> ${v.ex2}<br><b>V3:</b> ${v.ex3}</div>
      </div>`;
  }

  function buildReviewCard(v) {
    return `
      <div class="verb-card">
        <div class="card-header">
          <div><div class="card-title">${v.v1}</div><div style="color:var(--text-sub);">${v.meaning}</div></div>
          <span class="type-badge type-${v.type}">${v.type}</span>
        </div>
        <div class="forms-row">
          <div class="form-box"><span class="form-label">V1</span><div class="form-word">${v.v1}</div></div>
          <div class="form-box"><span class="form-label">V2</span><input class="review-input r-v2" placeholder="?"></div>
          <div class="form-box"><span class="form-label">V3</span><input class="review-input r-v3" placeholder="?"></div>
        </div>
        <button class="btn-review-check" onclick="checkReview(this, '${v.v2}', '${v.v3}')">Check</button>
      </div>`;
  }

  function startQuiz(type) {
    const container = document.getElementById('quiz-container');
    const controls = document.getElementById('quiz-controls');
    state.quizType = type;
    
    // 隨機選 10 題
    const pool = type === 'q1' ? [...verbs] : [...quizPool];
    state.activeQuiz = pool.sort(() => 0.5 - Math.random()).slice(0, 10);

    container.innerHTML = state.activeQuiz.map((item, i) => {
      // Quiz 1: 三態填空 | Quiz 2: 句子填空 (CSV 兩欄版)
      const qTitle = type === 'q1' ? `${item.v1} (${item.meaning})` : `Question ${i+1}`;
      const qSentence = type === 'q1' ? '' : `<div class="quiz-sentence">${item.qText.replace('_____', '________')}</div>`;
      
      return `
        <div class="quiz-item">
          <div class="quiz-q-text">${qTitle}</div>
          ${qSentence}
          <div style="display:flex; gap:10px;">
            ${type === 'q1' ? 
              `<input class="q-input u-v2" placeholder="V2"> <input class="q-input u-v3" placeholder="V3">` : 
              `<input class="q-input u-ans" placeholder="填寫正確動詞...">`
            }
          </div>
          <div class="feedback-box"></div>
        </div>`;
    }).join('');

    controls.classList.remove('hidden');
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  function submitQuiz() {
    const items = document.querySelectorAll('.quiz-item');
    let score = 0;

    items.forEach((div, i) => {
      const data = state.activeQuiz[i];
      const fb = div.querySelector('.feedback-box');
      let isCorrect = false;
      let correctAns = "";

      if (state.quizType === 'q1') {
        const uv2 = div.querySelector('.u-v2').value.trim().toLowerCase();
        const uv3 = div.querySelector('.u-v3').value.trim().toLowerCase();
        isCorrect = (uv2 === data.v2.toLowerCase() && uv3 === data.v3.toLowerCase());
        correctAns = `${data.v2} / ${data.v3}`;
      } else {
        const uans = div.querySelector('.u-ans').value.trim().toLowerCase();
        isCorrect = (uans === data.answer.toLowerCase());
        correctAns = data.answer;
      }

      if (isCorrect) score += 10;
      fb.className = `feedback-box ${isCorrect ? 'fb-correct' : 'fb-wrong'}`;
      fb.innerHTML = isCorrect ? '✓ Correct!' : `✗ Answer: ${correctAns}`;
      div.style.borderColor = isCorrect ? '#10b981' : '#ef4444';
      div.querySelectorAll('input').forEach(inp => inp.disabled = true);
    });

    alert(`Quiz Finished! Score: ${score}/100`);
    document.getElementById('quiz-controls').classList.add('hidden');
  }

  function bindEvents() {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.mode = btn.dataset.mode;
        renderMain();
      };
    });
    document.getElementById('search-input').oninput = (e) => {
      state.search = e.target.value.toLowerCase();
      renderMain();
    };
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.filter = btn.dataset.filter;
        renderMain();
      };
    });
    document.getElementById('q1-btn').onclick = () => startQuiz('q1');
    document.getElementById('q2-btn').onclick = () => startQuiz('q2');
    document.getElementById('submit-quiz').onclick = submitQuiz;
  }

  window.checkReview = (btn, v2, v3) => {
    const card = btn.closest('.verb-card');
    const i2 = card.querySelector('.r-v2');
    const i3 = card.querySelector('.r-v3');
    const ok2 = i2.value.trim().toLowerCase() === v2.toLowerCase();
    const ok3 = i3.value.trim().toLowerCase() === v3.toLowerCase();
    i2.style.borderColor = ok2 ? '#10b981' : '#ef4444';
    i3.style.borderColor = ok3 ? '#10b981' : '#ef4444';
  };

  window.toggleEx = (btn) => {
    const content = btn.nextElementSibling;
    const isHidden = content.style.display === 'none' || content.style.display === '';
    content.style.display = isHidden ? 'block' : 'none';
    btn.innerText = isHidden ? 'Hide Examples ▲' : 'Show Examples ▼';
  };

  init();
</script>
</body>
</html>
