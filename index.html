
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirley's Lemon Grammar Orchard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,600;0,700;1,600&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-green: #1e4620;
            --bark-dark:  #2e1608;
            --bark-mid:   #5c3a1e;
            --lemon-gold: #f5c800;
            --lemon-bright: #ffef30;
            --text: #1a2e1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(180deg,
                #aad4ee 0%, #c8e8f5 18%,
                #d8f0d4 42%, #e8f5e0 62%, #eff7ea 100%);
        }

        /* ── SKY LAYER ── */
        #sky-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 46%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* ── CLOUDS ── */
        .cloud {
            position: absolute;
            opacity: 0;
            animation: cloudDrift linear infinite;
        }
        @keyframes cloudDrift {
            0%   { transform: translateX(-340px); opacity: 0; }
            5%   { opacity: 0.85; }
            92%  { opacity: 0.85; }
            100% { transform: translateX(calc(100vw + 340px)); opacity: 0; }
        }

        /* ── BIRDS ── */
        .bird-flock {
            position: absolute;
            animation: birdFly linear infinite;
            opacity: 0;
        }
        @keyframes birdFly {
            0%   { transform: translateX(-200px) translateY(0); opacity: 0; }
            4%   { opacity: 1; }
            94%  { opacity: 1; }
            100% { transform: translateX(calc(100vw + 200px)) translateY(-35px); opacity: 0; }
        }
        .wing-l { animation: flapL 0.42s ease-in-out infinite alternate; transform-origin: 9px 4px; }
        .wing-r { animation: flapR 0.42s ease-in-out infinite alternate; transform-origin: 9px 4px; }
        @keyframes flapL { from{transform:rotate(-28deg)} to{transform:rotate(14deg)} }
        @keyframes flapR { from{transform:rotate(28deg)}  to{transform:rotate(-14deg)} }

        /* ── GROUND ── */
        #ground-strip {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 120px;
            background: radial-gradient(ellipse at 50% 110%, #6aaa26 0%, #4a8a16 45%, #2e5e08 100%);
            border-radius: 55% 55% 0 0 / 35% 35% 0 0;
            z-index: 0;
        }

        header {
            width: 100%;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: flex-end;
            position: relative; z-index: 10;
        }
        .back-btn {
            text-decoration: none;
            color: var(--deep-green);
            font-weight: 700; font-size: 0.88rem;
            padding: 0.55rem 1.4rem;
            border: 2px solid var(--deep-green);
            border-radius: 25px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.76);
            backdrop-filter: blur(4px);
        }
        .back-btn:hover { background: var(--deep-green); color: white; }

        .hero-section {
            text-align: center; margin-bottom: 0;
            padding: 0 1rem; position: relative; z-index: 10;
        }
        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            color: var(--deep-green);
            text-shadow: 0 2px 10px rgba(30,70,32,0.18);
        }
        h1 span { color: #a07800; font-style: italic; }
        .hero-section p { color: #5a7a5a; font-size: 0.9rem; margin-top: 4px; }

        .tree-container {
            width: 100%; max-width: 1100px;
            position: relative; z-index: 10;
        }
        svg.main-tree { width: 100%; height: auto; overflow: visible; }

        .branch-header {
            font-family: 'Crimson Pro', serif;
            font-size: 17px; font-weight: 700; fill: var(--deep-green);
        }

        /* Lemon interactions */
        .lemon-group { cursor: pointer; }
        .lemon-fruit { transition: filter 0.22s, transform 0.22s cubic-bezier(0.175,0.885,0.32,1.275); }
        .lemon-group:hover .lemon-fruit {
            filter: drop-shadow(0 0 13px rgba(255,215,0,0.95)) brightness(1.14);
            transform: scale(1.13);
        }
        .lemon-group:hover .lemon-label-bg  { opacity: 1; }
        .lemon-group:hover .lemon-label-text { opacity: 1; }
        .sparkle .lemon-fruit { animation: lemon-pop 0.62s ease-out forwards; }
        @keyframes lemon-pop {
            0%  { filter:brightness(1); transform:scale(1); }
            40% { filter:brightness(2) drop-shadow(0 0 22px gold); transform:scale(1.28) rotate(-6deg); }
            70% { transform:scale(0.93) rotate(3deg); }
            100%{ filter:brightness(1); transform:scale(1) rotate(0); }
        }
        .lemon-label-bg   { opacity: 0; transition: opacity 0.18s; }
        .lemon-label-text { opacity: 0; transition: opacity 0.18s;
            font-size: 10px; font-weight: 700; fill: #3a2800; text-anchor: middle;
            font-family: 'Quicksand', sans-serif; }

        .trunk-node { cursor: pointer; }
        .trunk-node .node-bg { transition: fill 0.22s, filter 0.22s; }
        .trunk-node:hover .node-bg { fill: var(--lemon-bright); filter: drop-shadow(0 3px 8px rgba(200,160,0,0.55)); }
        .trunk-node text { font-size: 11.5px; font-weight: 700; fill: var(--bark-dark); pointer-events: none; font-family: 'Quicksand', sans-serif; }

        /* Market */
        .market-section {
            width: 100%; max-width: 1000px;
            text-align: center; margin: 4px 0 80px 0;
            position: relative; z-index: 10;
        }
        .market-btn {
            background: rgba(255,255,255,0.88);
            border: 2.5px solid var(--lemon-gold);
            padding: 0.85rem 2.5rem;
            font-family: 'Crimson Pro', serif; font-size: 1.28rem;
            color: #6a5500; border-radius: 50px; cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 18px rgba(200,160,0,0.18);
        }
        .market-btn:hover { background: var(--lemon-bright); transform: scale(1.04); }
        .stalls-wrapper {
            display: none; flex-wrap: wrap;
            justify-content: center; gap: 16px; margin-top: 26px;
        }
        .stall-card {
            width: 144px; background: white;
            padding: 18px 10px; border-radius: 14px;
            border-bottom: 5px solid var(--lemon-gold);
            box-shadow: 0 6px 18px rgba(0,0,0,0.07);
            cursor: pointer; font-weight: 700; font-size: 0.9rem;
            color: var(--deep-green); transition: all 0.22s;
        }
        .stall-card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.11); }

        /* Quiz */
        #quiz-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(236,245,230,0.97);
            z-index: 5000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .hud-container {
            width: 90%; max-width: 560px; background: white;
            border-top: 8px solid var(--lemon-gold);
            padding: 30px; border-radius: 16px;
            box-shadow: 0 10px 44px rgba(0,0,0,0.11);
        }
        #hud-title { font-family: 'Crimson Pro', serif; color: var(--deep-green); margin-bottom: 18px; }
        .option-btn {
            display: block; width: 100%;
            background: #fafff6; border: 1.5px solid #d4e8d0;
            padding: 12px 15px; margin-bottom: 8px;
            border-radius: 9px; cursor: pointer; text-align: left;
            font-family: 'Quicksand', sans-serif; font-size: 0.92rem;
            font-weight: 600; transition: all 0.18s; color: var(--text);
        }
        .option-btn:hover { border-color: var(--lemon-gold); background: #fffde8; }
        .option-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .option-btn.wrong   { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    </style>
</head>

<defs>

  <!-- Lemon -->

    <stop offset="0%"   stop-color="#ffffc0"/>

  <text class="lemon-label-text" y="43">Inverted 倒裝句</text>
</g>

<!-- Subjunctive -->
<g class="lemon-group" onclick="sparkle(this,'subjunctive')" transform="translate(592,328)">
  <line x1="0" y1="0" x2="0" y2="-12" stroke="#3a6a1e" stroke-width="1.6"/>
  <g style="animation:sw1 5s ease-in-out infinite 1s;transform-origin:0 -12px">
    <path d="M0,-12 Q-10,-22 -4,-36 Q5,-20 0,-12Z" fill="#3a8c3e" filter="url(#lfT)"/>
    <path d="M0,-12 Q9,-20 15,-34 Q3,-18 0,-12Z"   fill="#52a456" filter="url(#lfT)"/>
  </g>
  <ellipse class="lemon-fruit" cx="0" cy="14" rx="20" ry="15" fill="url(#lG)" stroke="#a07800" stroke-width="1.2" filter="url(#peel)"/>
  <ellipse cx="-5" cy="9" rx="9" ry="5.5" fill="url(#lS)" opacity="0.78"/>
  <rect class="lemon-label-bg" x="-30" y="33" width="60" height="15" rx="6" fill="rgba(255,255,255,0.92)"/>
  <text class="lemon-label-text" y="43">Subj. 假設語氣</text>
</g>

</g><!-- end .tree-body -->

</svg>
</div>

<!-- Market -->
<div class="market-section">
  <button class="market-btn" onclick="toggleStalls()">🧺 Visit Market Stalls (Challenges)</button>
  <div class="stalls-wrapper" id="tracks-wrapper">
    <div class="stall-card" onclick="startRace('structure')">🍋<br><br>Structure Stall</div>
    <div class="stall-card" onclick="startRace('pos')">🧺<br><br>Parts of Speech</div>
    <div class="stall-card" onclick="startRace('nonfinite')">🌿<br><br>Non-Finite</div>
    <div class="stall-card" onclick="startRace('clauses')">🍯<br><br>Clauses</div>
    <div class="stall-card" onclick="startRace('special')">✨<br><br>Special Styles</div>
  </div>
</div>

<!-- Quiz -->
<div id="quiz-overlay">
  <div class="hud-container">
    <div id="quiz-content">
      <h2 id="hud-title">🍋 Lemon Challenge</h2>
      <div id="quiz-body"></div>
      <div style="margin-top:22px;display:flex;justify-content:space-between;gap:12px;">
        <button class="back-btn" onclick="closeQuiz()" style="font-size:0.88rem;">✕ Exit</button>
        <button class="back-btn" id="submit-btn" style="background:var(--lemon-bright);font-size:0.88rem;" onclick="submitAnswer()">Submit →</button>
      </div>
    </div>
    <div id="result-content" style="display:none;text-align:center;padding:18px 0">
      <div style="font-size:3rem;margin-bottom:8px">🍋</div>
      <h2 style="font-family:'Crimson Pro',serif;font-size:2rem;color:var(--deep-green)">Your Score</h2>
      <p style="font-size:2.8rem;font-weight:700;color:#a07800;margin:10px 0"><span id="final-score">0</span> / 100</p>
      <button class="back-btn" onclick="closeQuiz()" style="margin-top:14px">Return to Orchard</button>
    </div>
  </div>
</div>

<script>
const grammarCSV = `no.,key point,url
S-1,simple,https://ducj-creator.github.io/Shirley-Grammar/simple/
S-2,compound,https://ducj-creator.github.io/Shirley-Grammar/compound/
S-3,complex,https://ducj-creator.github.io/Shirley-Grammar/complex/
S-4,compound-complex,https://ducj-creator.github.io/Shirley-Grammar/compound-complex/
P-1,nouns,https://ducj-creator.github.io/Shirley-Grammar/nouns/
P-2,pronouns,https://ducj-creator.github.io/Shirley-Grammar/pronouns/
P-3,adjectives-adverbs,https://ducj-creator.github.io/Shirley-Grammar/adjectives-adverbs/
P-4,verbs,https://ducj-creator.github.io/Shirley-Grammar/verbs/
P-5,prepositions,https://ducj-creator.github.io/Shirley-Grammar/prepositions/
V-1,infinitive,https://ducj-creator.github.io/Shirley-Grammar/infinitive/
V-2,gerund,https://ducj-creator.github.io/Shirley-Grammar/gerund/
V-3,present-participle,https://ducj-creator.github.io/Shirley-Grammar/present-participle/
V-4,past-participle,https://ducj-creator.github.io/Shirley-Grammar/past-participle/
C-1,noun-clause,https://ducj-creator.github.io/Shirley-Grammar/noun-clause/
C-2,adjective-clause,https://ducj-creator.github.io/Shirley-Grammar/adjective-clause/
C-3,adverb-clause,https://ducj-creator.github.io/Shirley-Grammar/adverb-clause/
SS-1,questions,https://ducj-creator.github.io/Shirley-Grammar/questions/
SS-2,exclamations,https://ducj-creator.github.io/Shirley-Grammar/exclamations/
SS-3,inverted,https://ducj-creator.github.io/Shirley-Grammar/inverted/
SS-4,subjunctive,https://ducj-creator.github.io/Shirley-Grammar/subjunctive/`;

function parseCSV(csv) {
    const map = {};
    csv.split('\n').slice(1).forEach(line => {
        const cols = line.split(',');
        if (cols.length >= 3) map[cols[1].trim()] = cols[2].trim();
    });
    return map;
}
const links = parseCSV(grammarCSV);

function sparkle(el, key) {
    el.classList.add('sparkle');
    setTimeout(() => { el.classList.remove('sparkle'); if (links[key]) window.open(links[key],'_blank'); }, 620);
}
function handleLink(key) { if (links[key]) window.open(links[key],'_blank'); }
function toggleStalls() {
    const w = document.getElementById('tracks-wrapper');
    w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
}

let currentQuestions=[], currentIdx=0, score=0, selected=-1;

function startRace(id) {
    const urls = {
        'structure':'https://ducj-creator.github.io/Shirley-Grammar/assets/sentence%20structure%20quiz.txt',
        'pos':      'https://ducj-creator.github.io/Shirley-Grammar/assets/I%20part%20of%20speech%20quiz.txt',
        'nonfinite':'https://ducj-creator.github.io/Shirley-Grammar/assets/II%20non-infinite%20quiz.txt',
        'clauses':  'https://ducj-creator.github.io/Shirley-Grammar/assets/III%20clauses%20quiz.txt',
        'special':  'https://ducj-creator.github.io/Shirley-Grammar/assets/IV%20special%20sentence%20quiz.txt'
    };
    document.getElementById('quiz-overlay').style.display = 'flex';
    document.getElementById('quiz-content').style.display = 'block';
    document.getElementById('result-content').style.display = 'none';
    fetch(urls[id]).then(r=>r.text()).then(txt=>{
        currentQuestions = parseQuiz(txt).slice(0,10);
        currentIdx=0; score=0; renderQ();
    });
}
function parseQuiz(text) {
    return text.split(/\n\s*\n/).map(block=>{
        const lines = block.split('\n').filter(l=>l.trim());
        if (lines.length<2) return null;
        const q=lines[0]; const opts=[]; let correct=0;
        lines.slice(1).forEach((l,i)=>{ if(l.match(/[●⚫\[✓\]]/)) correct=i; opts.push(l.replace(/[●⚫\[✓\]]/g,'').trim()); });
        return {q,opts,correct};
    }).filter(x=>x);
}
function renderQ() {
    selected=-1;
    const q=currentQuestions[currentIdx];
    document.getElementById('quiz-body').innerHTML =
        `<p style="font-weight:700;margin-bottom:12px;color:#2d5a27">${currentIdx+1} / ${currentQuestions.length}</p>
         <h3 style="margin-bottom:14px;font-family:'Crimson Pro',serif;font-size:1.15rem">${q.q}</h3>`+
        q.opts.map((o,i)=>`<button class="option-btn" id="o-${i}" onclick="selectOption(${i})">${o}</button>`).join('');
    document.getElementById('submit-btn').dataset.done="false";
    document.getElementById('submit-btn').textContent="Submit →";
}
function selectOption(i) {
    selected=i;
    document.querySelectorAll('.option-btn').forEach(b=>{b.style.borderColor='#d4e8d0';b.style.background='#fafff6';});
    const btn=document.getElementById(`o-${i}`);
    btn.style.borderColor='var(--lemon-gold)'; btn.style.background='#fffde8';
}
function submitAnswer() {
    const btn=document.getElementById('submit-btn');
    const q=currentQuestions[currentIdx];
    if (btn.dataset.done==="false") {
        if (selected===-1) return;
        document.getElementById(`o-${q.correct}`).classList.add('correct');
        if (selected===q.correct) score+=10; else document.getElementById(`o-${selected}`).classList.add('wrong');
        btn.dataset.done="true";
        btn.textContent = currentIdx<currentQuestions.length-1 ? "Next →" : "See Results →";
    } else {
        currentIdx++;
        if (currentIdx<currentQuestions.length) renderQ();
        else {
            document.getElementById('quiz-content').style.display='none';
            document.getElementById('result-content').style.display='block';
            document.getElementById('final-score').innerText=score;
        }
    }
}
function closeQuiz() {
    document.getElementById('quiz-overlay').style.display='none';
    document.getElementById('quiz-content').style.display='block';
    document.getElementById('result-content').style.display='none';
}
</script>
</body>
</html>
